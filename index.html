<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>年間予定｜岩手県中学生ソフトテニス連盟</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1a4a2e;--green-dark:#0f2e1b;--green-light:#2a6b42;
  --gold:#c8a020;--gold-light:#e0c050;--white:#fff;--gray:#f7f7f3;
  --text:#222;--text-light:#666;--radius:12px;
  --cat-tournament:#b33030;--cat-meeting:#6a3a8a;
  --cat-seminar:#2555a0;--cat-training:#227a4a;--cat-other:#666;
}
html{font-size:15px}
body{font-family:'Noto Sans JP',sans-serif;background:var(--gray);color:var(--text);min-height:100vh}
a{color:inherit;text-decoration:none}

/* ========== HEADER ========== */
.header{background:linear-gradient(135deg,var(--green-dark) 0%,var(--green) 60%,var(--green-light) 100%);color:var(--white);padding:28px 20px 24px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.25);position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;background:rgba(255,255,255,.04);border-radius:50%}
.header::after{content:'🎾';position:absolute;right:20px;bottom:10px;font-size:3rem;opacity:.12}
.header-inner{max-width:800px;margin:0 auto;position:relative;z-index:1}
.header-org{font-size:.85rem;font-weight:500;color:var(--gold);letter-spacing:.1em;margin-bottom:6px}
.header-title{font-size:1.5rem;font-weight:900;letter-spacing:.04em;line-height:1.4}
@media(min-width:600px){.header-title{font-size:1.8rem}}

/* ========== MAIN ========== */
.main{max-width:800px;margin:0 auto;padding:20px 16px 40px}

/* ========== SECTION DIVIDER ========== */
.section-divider{font-size:.88rem;font-weight:900;color:var(--green);margin:28px 0 12px;padding:8px 14px;background:var(--white);border-radius:8px;border-left:4px solid var(--green);box-shadow:0 1px 4px rgba(0,0,0,.06)}
.section-divider.past{color:var(--text-light);border-left-color:#aaa}

/* ========== EVENT CARD ========== */
.event-card{background:var(--white);border-radius:var(--radius);margin-bottom:12px;box-shadow:0 1px 8px rgba(0,0,0,.05);display:flex;overflow:hidden;transition:box-shadow .2s,transform .15s}
.event-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.1);transform:translateY(-1px)}

.card-accent{width:6px;flex-shrink:0}

.card-body{flex:1;padding:16px 18px;min-width:0}

.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.card-date{font-size:.82rem;font-weight:700;color:var(--green)}
.card-date .dow{font-weight:500}
.card-date .range{color:var(--text-light);font-weight:500}

.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.65rem;font-weight:700;color:var(--white);vertical-align:middle}

.card-name{font-size:1rem;font-weight:900;line-height:1.4;margin-bottom:6px}

.card-meta{font-size:.78rem;color:var(--text-light);line-height:1.6}
.card-meta span{margin-right:12px}

.card-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.btn{display:inline-block;padding:8px 16px;border-radius:7px;font-size:.78rem;font-weight:700;border:none;cursor:pointer;text-align:center;transition:opacity .2s;font-family:inherit;line-height:1.3}
.btn-green{background:var(--green);color:var(--white)}
.btn-green:hover{background:var(--green-light)}

/* ========== PAST EVENT ========== */
.event-card.past{opacity:.5;pointer-events:auto}
.event-card.past:hover{opacity:.65;transform:none}
.event-card.past .card-name{color:var(--text-light)}
.ended-badge{display:inline-block;background:#ddd;color:#888;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:4px;margin-left:8px;vertical-align:middle}
.applied-badge{display:inline-block;background:#d4edda;color:#155724;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:4px;margin-left:8px;vertical-align:middle}

/* ========== ALERT BANNER ========== */
.alert-banner{background:#fff8e1;border:2px solid var(--gold);border-radius:var(--radius);padding:12px 16px;margin-bottom:20px}
.alert-item{font-size:.82rem;color:#7a5d00;font-weight:700;padding:2px 0}

/* ========== LOADING ========== */
.loading{text-align:center;padding:60px 20px;color:var(--text-light)}
.loading .spinner{display:inline-block;width:28px;height:28px;border:3px solid #ddd;border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.no-data{text-align:center;padding:40px;color:var(--text-light);font-size:.88rem}

/* ========== FOOTER ========== */
.footer{text-align:center;padding:30px 20px;font-size:.7rem;color:var(--text-light)}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-org">岩手県中学生ソフトテニス連盟</div>
    <h1 class="header-title" id="headerTitle">年間予定</h1>
  </div>
</header>

<main class="main">
  <div id="alertArea"></div>
  <div class="loading" id="loadingArea">
    <div class="spinner"></div>
    <div>データを読み込んでいます...</div>
  </div>
  <div id="cardArea"></div>
</main>

<footer class="footer">
  &copy; 岩手県中学生ソフトテニス連盟
</footer>

<script>
/* ========== CONFIG ========== */
var CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-lGDkzU9W1EPhITCpMPchihRd6EKjcAxZB4RWKKeuH03xzSIzM86OjvpksZEawwVn-uLuaasCJ6QP/pub?gid=0&single=true&output=csv';
var PROXIES = [
  'https://corsproxy.io/?',
  'https://api.allorigins.win/raw?url='
];
var FETCH_TIMEOUT = 8000;

/* ========== COLUMN INDEX ========== */
var COL = {
  START_DATE: 0, END_DATE: 1, NAME: 2,
  ORGANIZER: 3, CO_ORGANIZER: 4, SUPPORT: 5, MANAGER: 6,
  VENUE: 7, VENUE_MAP: 8,
  OPEN: 9, COURT_OPEN: 10, RECEPTION: 11, MEETING: 12,
  CEREMONY: 13, GAME_START: 14, GAME_END: 15,
  QUALIFICATION: 16, CATEGORY: 17, FORMAT: 18, AWARDS: 19,
  APPLICATION: 20, FEE: 21, NOTES: 22, PDF_URL: 23, STATUS: 24
};

/* ========== MONTH COLORS (pastel) ========== */
var MONTH_COLORS = {
  1:  { bg: '#f0e6ff', accent: '#9b72cf' },
  2:  { bg: '#e6f7ef', accent: '#5bb88a' },
  3:  { bg: '#ffeee6', accent: '#e08860' },
  4:  { bg: '#ffe6f0', accent: '#d4739a' },
  5:  { bg: '#e6ffe6', accent: '#5aad5a' },
  6:  { bg: '#e6f0ff', accent: '#6a8fd4' },
  7:  { bg: '#e6faff', accent: '#4aafcf' },
  8:  { bg: '#fff9e6', accent: '#c8a830' },
  9:  { bg: '#fff0e6', accent: '#cf8a4a' },
  10: { bg: '#f5e6e6', accent: '#b06060' },
  11: { bg: '#eee8e0', accent: '#8a7560' },
  12: { bg: '#e8ecf0', accent: '#708090' }
};

var DOW = ['日','月','火','水','木','金','土'];

/* ========== CSV PARSER ========== */
function parseCSVFull(text) {
  var rows = [];
  var row = [];
  var cell = '';
  var inQuotes = false;
  var i, ch;
  for (i = 0; i < text.length; i++) {
    ch = text[i];
    if (inQuotes) {
      if (ch === '"') {
        if (i + 1 < text.length && text[i + 1] === '"') { cell += '"'; i++; }
        else { inQuotes = false; }
      } else { cell += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === ',') { row.push(cell.trim()); cell = ''; }
      else if (ch === '\n' || ch === '\r') {
        row.push(cell.trim()); cell = '';
        if (ch === '\r' && i + 1 < text.length && text[i + 1] === '\n') i++;
        if (row.length > 1 || (row.length === 1 && row[0] !== '')) rows.push(row);
        row = [];
      } else { cell += ch; }
    }
  }
  if (cell !== '' || row.length > 0) { row.push(cell.trim()); rows.push(row); }
  return rows;
}

/* ========== FETCH ========== */
function fetchWithTimeout(url, timeout) {
  return new Promise(function(resolve, reject) {
    var controller = new AbortController();
    var timer = setTimeout(function() { controller.abort(); reject(new Error('Timeout')); }, timeout);
    fetch(url, { signal: controller.signal }).then(function(res) { clearTimeout(timer); resolve(res); }).catch(function(err) { clearTimeout(timer); reject(err); });
  });
}

function fetchData() {
  var attempt = function(index) {
    if (index >= PROXIES.length) return Promise.reject(new Error('All proxies failed'));
    var url = PROXIES[index] + encodeURIComponent(CSV_URL);
    return fetchWithTimeout(url, FETCH_TIMEOUT).then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.text();
    }).catch(function() { return attempt(index + 1); });
  };
  return attempt(0);
}

/* ========== HELPERS ========== */
function parseDate(str) {
  if (!str) return null;
  var parts = str.replace(/\//g, '-').split('-');
  if (parts.length < 3) return null;
  return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
}

function formatDate(d) {
  return (d.getMonth() + 1) + '/' + d.getDate() + '(' + DOW[d.getDay()] + ')';
}

function getCategory(row) {
  var txt = (row[COL.NAME] || '') + (row[COL.CATEGORY] || '');
  if (txt.indexOf('大会') >= 0) return { label: '大会', color: 'var(--cat-tournament)' };
  if (txt.indexOf('会議') >= 0) return { label: '会議', color: 'var(--cat-meeting)' };
  if (txt.indexOf('講習') >= 0) return { label: '講習会', color: 'var(--cat-seminar)' };
  if (txt.indexOf('強化') >= 0 || txt.indexOf('練習') >= 0) return { label: '強化練習会', color: 'var(--cat-training)' };
  return { label: 'その他', color: 'var(--cat-other)' };
}

function getReiwa(year, month) {
  var fy = (month >= 4) ? year : year - 1;
  return '令和' + (fy - 2018) + '年度';
}

function daysBetween(a, b) {
  return Math.round((b.getTime() - a.getTime()) / 86400000);
}

/* ========== PROCESS DATA ========== */
function processData(text) {
  var rows = parseCSVFull(text);
  if (rows.length < 2) return [];
  var events = [];
  var i, row, startDate, endDate;
  for (i = 1; i < rows.length; i++) {
    row = rows[i];
    if (!row[COL.START_DATE] || !row[COL.NAME]) continue;
    startDate = parseDate(row[COL.START_DATE]);
    endDate = row[COL.END_DATE] ? parseDate(row[COL.END_DATE]) : null;
    if (!startDate) continue;
    events.push({
      row: row,
      startDate: startDate,
      endDate: endDate,
      name: row[COL.NAME],
      venue: row[COL.VENUE] || '',
      category: getCategory(row)
    });
  }
  events.sort(function(a, b) { return a.startDate.getTime() - b.startDate.getTime(); });
  return events;
}

/* ========== SET HEADER ========== */
function setHeader() {
  var now = new Date();
  var reiwa = getReiwa(now.getFullYear(), now.getMonth() + 1);
  document.getElementById('headerTitle').textContent = reiwa + '　年間予定';
  document.title = reiwa + ' 年間予定｜岩手県中学生ソフトテニス連盟';
}

/* ========== ALERT BANNER ========== */
function renderAlerts(events) {
  var area = document.getElementById('alertArea');
  var today = new Date();
  today = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  var alerts = [];
  var i, evt, diff;
  for (i = 0; i < events.length; i++) {
    evt = events[i];
    diff = daysBetween(today, evt.startDate);
    if (diff >= 0 && diff <= 7) {
      if (diff === 0) {
        alerts.push('⚠️ ' + evt.name + ' は本日開催');
      } else {
        alerts.push('⚠️ ' + evt.name + ' まであと' + diff + '日');
      }
    }
  }
  if (alerts.length === 0) { area.innerHTML = ''; return; }
  var html = '<div class="alert-banner">';
  for (i = 0; i < alerts.length; i++) {
    html += '<div class="alert-item">' + alerts[i] + '</div>';
  }
  html += '</div>';
  area.innerHTML = html;
}

/* ========== RENDER CARD ========== */
function renderCard(evt, isPast) {
  var m = evt.startDate.getMonth() + 1;
  var mc = MONTH_COLORS[m] || { bg: '#f0f0f0', accent: '#999' };
  var cls = 'event-card' + (isPast ? ' past' : '');
  var cat = evt.category;

  var dateStr = formatDate(evt.startDate);
  if (evt.endDate) {
    dateStr += '<span class="range"> 〜 ' + formatDate(evt.endDate) + '</span>';
  }

  var html = '';
  html += '<div class="' + cls + '" style="background:' + (isPast ? '#f5f5f5' : mc.bg) + '">';
  html += '<div class="card-accent" style="background:' + (isPast ? '#ccc' : mc.accent) + '"></div>';
  html += '<div class="card-body">';

  html += '<div class="card-top">';
  html += '<div class="card-date">' + dateStr + '</div>';
  html += '<span class="badge" style="background:' + (isPast ? '#aaa' : cat.color) + '">' + cat.label + '</span>';
  if (isPast) html += '<span class="ended-badge">イベント終了</span>';
  if (!isPast && isApplied(evt.name)) html += '<span class="applied-badge">✔ 申込済み</span>';
  html += '</div>';

  html += '<div class="card-name">' + escapeHtml(evt.name) + '</div>';

  html += '<div class="card-meta">';
  if (evt.venue) html += '<span>📍 ' + escapeHtml(evt.venue) + '</span>';
  if (evt.row[COL.GAME_START]) html += '<span>🕐 ' + escapeHtml(evt.row[COL.GAME_START]) + '〜</span>';
  if (evt.row[COL.CATEGORY]) html += '<span>' + escapeHtml(evt.row[COL.CATEGORY]) + '</span>';
  html += '</div>';

  if (!isPast) {
    var catLabel = cat.label;
    if (catLabel === '大会' || catLabel === '講習会' || catLabel === '強化練習会') {
      var detailDate = evt.startDate.getFullYear() + '-' + (evt.startDate.getMonth() + 1) + '-' + evt.startDate.getDate();
      html += '<div class="card-actions">';
      html += '<a class="btn btn-green" href="detail.html?date=' + detailDate + '">大会要項を見る →</a>';
      html += '</div>';
    }
  }

  html += '</div></div>';
  return html;
}

function isApplied(eventName) {
  try {
    var applied = JSON.parse(localStorage.getItem('appliedEvents') || '[]');
    var i;
    for (i = 0; i < applied.length; i++) {
      if (applied[i].tournament === eventName) return true;
    }
  } catch(e) {}
  return false;
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

/* ========== RENDER ALL ========== */
function render(events) {
  var area = document.getElementById('cardArea');
  var today = new Date();
  today = new Date(today.getFullYear(), today.getMonth(), today.getDate());

  var upcoming = [];
  var past = [];
  var i, evt, evtEnd;

  for (i = 0; i < events.length; i++) {
    evt = events[i];
    evtEnd = evt.endDate || evt.startDate;
    var endOfDay = new Date(evtEnd.getFullYear(), evtEnd.getMonth(), evtEnd.getDate());
    if (endOfDay < today) {
      past.push(evt);
    } else {
      upcoming.push(evt);
    }
  }

  if (upcoming.length === 0 && past.length === 0) {
    area.innerHTML = '<div class="no-data">予定が登録されていません</div>';
    return;
  }

  var html = '';

  if (upcoming.length > 0) {
    html += '<div class="section-divider">今後の予定（' + upcoming.length + '件）</div>';
    for (i = 0; i < upcoming.length; i++) {
      html += renderCard(upcoming[i], false);
    }
  }

  if (past.length > 0) {
    html += '<div class="section-divider past">終了したイベント（' + past.length + '件）</div>';
    for (i = past.length - 1; i >= 0; i--) {
      html += renderCard(past[i], true);
    }
  }

  area.innerHTML = html;
}

/* ========== INIT ========== */
function init() {
  setHeader();
  fetchData().then(function(text) {
    document.getElementById('loadingArea').style.display = 'none';
    var events = processData(text);
    renderAlerts(events);
    render(events);
  }).catch(function(err) {
    document.getElementById('loadingArea').innerHTML = '<div class="no-data">データの読み込みに失敗しました。<br>時間をおいて再度アクセスしてください。</div>';
    console.error(err);
  });
}

init();
</script>
</body>
</html>
