<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>進行状況｜ソフトテニス大会DX</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --c-bg: #f0f2f5;
  --c-surface: #ffffff;
  --c-border: #d0d7de;
  --c-text: #1a1a1a;
  --c-text2: #5f6b7a;
  --c-accent: #0d7c3e;
  --c-accent-light: #e6f5ec;
  --c-accent2: #0969b2;
  --c-accent2-light: #e4f0fb;
  --c-warn: #f57c00;
  --c-warn-light: #fff4e5;
  --c-purple: #3949ab;
  --c-purple-light: #e8eaf6;
  --c-live: #dc2626;
  --c-live-light: #fef2f2;
  --c-done: #374151;
  --c-done-light: #f3f4f6;
  --c-order-partial: #e65100;
  --c-order-partial-light: #fff0e0;
  --c-court-wait: #c62828;
  --c-court-wait-light: #fce4ec;
  --font-ja: 'Noto Sans JP', sans-serif;
  --font-en: 'Inter', sans-serif;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-ja); background: var(--c-bg); color: var(--c-text); font-size: 13px; }

/* Header */
.header {
  background: linear-gradient(135deg, #1e3a5f, var(--c-accent));
  color: #fff; padding: 14px 20px; position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; gap: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
.header h1 { font-size: 1.1rem; font-weight: 900; flex: 1; }
.header .live-dot { display: inline-block; width: 8px; height: 8px; background: #ef4444; border-radius: 50%; margin-right: 6px; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.3; } }
.header .update-text { font-size: .7rem; opacity: .8; }
.refresh-btn {
  padding: 6px 14px; border: 1px solid rgba(255,255,255,.3); border-radius: 6px;
  background: rgba(255,255,255,.1); color: #fff; font-size: .8rem; font-weight: 700;
  cursor: pointer; font-family: var(--font-ja);
}
.refresh-btn:hover { background: rgba(255,255,255,.2); }

/* Main */
.main { max-width: 100%; padding: 16px; overflow-x: auto; }

/* Court Matrix Table */
.matrix-wrap { overflow-x: auto; margin-bottom: 24px; }
.matrix {
  border-collapse: collapse; width: auto;
  background: var(--c-surface); border: 1px solid var(--c-border);
}
.matrix th, .matrix td {
  border: 1px solid var(--c-border); padding: 0; text-align: center; vertical-align: top;
}
.matrix th {
  background: #374151; color: #fff; font-size: .8rem; font-weight: 700;
  padding: 10px 8px; position: sticky; top: 0; z-index: 10;
}
.matrix th.row-header {
  background: #4b5563; width: 44px; min-width: 44px; position: sticky; left: 0; z-index: 11;
}
.matrix td.row-header {
  background: #f9fafb; font-weight: 900; font-size: .9rem; color: var(--c-text2);
  width: 44px; min-width: 44px; position: sticky; left: 0; z-index: 5;
  border-right: 2px solid var(--c-border); text-align: center; vertical-align: middle;
}
.matrix td { height: 90px; min-width: 120px; }

/* Match Cell */
.cell-empty { background: var(--c-surface); }
.match-cell {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 6px; height: 100%; font-size: .7rem; line-height: 1.4; gap: 2px;
  cursor: default; transition: all .15s;
}
.match-cell .cell-round { font-weight: 700; color: var(--c-text2); font-size: .7rem; }
.match-cell .cell-teams { font-weight: 900; font-size: .78rem; }
.match-cell .cell-score { font-family: var(--font-en); font-weight: 700; }
.match-cell .cell-status { font-weight: 800; font-size: .65rem; padding: 2px 6px; border-radius: 4px; margin-top: 2px; }

/* Status colors for cells */
.cell-playing {
  background: var(--c-live-light); animation: cellPulse 2s infinite;
}
.cell-playing .cell-status { background: var(--c-live); color: #fff; }
@keyframes cellPulse { 0%,100% { background: #fef2f2; } 50% { background: #fee2e2; } }

.cell-court-done { background: var(--c-purple-light); }
.cell-court-done .cell-status { background: var(--c-purple); color: #fff; }

.cell-done { background: var(--c-done-light); }
.cell-done .cell-status { background: var(--c-done); color: #fff; }

/* Queue sections */
.queue-area { max-width: 1200px; margin: 0 auto; }
.queue-section {
  background: var(--c-surface); border: 1px solid var(--c-border);
  border-radius: 8px; padding: 12px 16px; margin-bottom: 12px;
}
.queue-title {
  font-size: .8rem; font-weight: 800; color: var(--c-text2);
  margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--c-border);
  display: flex; align-items: center; gap: 6px;
}
.queue-title .cnt { font-size: .7rem; background: #e5e7eb; padding: 1px 8px; border-radius: 10px; }
.queue-note { font-size: .7rem; color: var(--c-text2); margin-top: 4px; }
.queue-desc { font-size: .78rem; color: var(--c-text2); margin-bottom: 10px; line-height: 1.5; }
.queue-type-label {
  font-size: .72rem; font-weight: 800; color: var(--c-text2);
  margin: 10px 0 6px; padding-left: 2px;
  border-left: 3px solid var(--c-border); padding-left: 8px;
}
.queue-empty { font-size: .78rem; color: #999; padding: 8px 4px; }
.queue-cards { display: flex; flex-wrap: wrap; gap: 8px; }
.queue-card {
  padding: 8px 12px; border-radius: 6px; font-size: .75rem; font-weight: 700;
  border: 1px solid var(--c-border); min-width: 140px;
}
.queue-card .qc-id { font-family: var(--font-en); font-size: .65rem; color: var(--c-text2); }
.queue-card .qc-teams { margin-top: 2px; }

.q-order-done { background: var(--c-accent2-light); border-color: var(--c-accent2); }
.q-order-partial { background: var(--c-order-partial-light); border-color: var(--c-order-partial); }
.q-court-wait { background: var(--c-court-wait-light); border-color: var(--c-court-wait); }
.q-waiting { background: var(--c-warn-light); border-color: var(--c-warn); }

/* Mode switcher */
.mode-switcher { display: flex; gap: 4px; }
.mode-btn {
  padding: 6px 14px; border: 1.5px solid rgba(255,255,255,.3); border-radius: 20px;
  background: rgba(255,255,255,.1); color: rgba(255,255,255,.8);
  font-size: .78rem; font-weight: 700; cursor: pointer; font-family: var(--font-ja);
  transition: all .15s;
}
.mode-btn:hover { background: rgba(255,255,255,.2); }
.mode-btn.active { background: #fff; color: var(--c-text); border-color: #fff; }
.mode-label { font-size: .85rem; font-weight: 700; color: rgba(255,255,255,.9); padding: 4px 14px; border: 1.5px solid rgba(255,255,255,.4); border-radius: 20px; }
.court-count-wrap { display: flex; flex-direction: column; align-items: center; gap: 2px; }

.footer { text-align: center; padding: 20px; font-size: .7rem; color: var(--c-text2); }
</style>
</head>
<body>

<header class="header">
  <h1><span class="live-dot"></span>🎾 大会進行状況</h1>
  <div class="mode-switcher" id="modeSwitcher" style="display:none;">
    <button class="mode-btn active" data-mode="all" onclick="setMode('all')">全種目</button>
    <button class="mode-btn" data-mode="team" onclick="setMode('team')">団体戦</button>
    <button class="mode-btn" data-mode="individual" onclick="setMode('individual')">個人戦</button>
  </div>
  <div class="mode-label" id="modeLabel" style="display:none;"></div>
  <div class="court-count-wrap" id="courtCountWrap" style="display:none;">
    <label style="font-size:.7rem;opacity:.7;">コート面数</label>
    <select id="courtCountSel" onchange="onCourtCountChange()" style="padding:4px 8px;border-radius:6px;border:1px solid rgba(255,255,255,.3);background:#fff;color:#1a1a1a;font-size:.85rem;font-weight:700;font-family:inherit;">
      <option value="4">4面</option>
      <option value="8">8面</option>
      <option value="10">10面</option>
      <option value="16" selected>16面</option>
      <option value="18">18面</option>
    </select>
  </div>
  <div>
    <div class="update-text" id="updateInfo">読み込み中...</div>
  </div>
  <button class="refresh-btn" onclick="fetchData()">🔄 更新</button>
</header>

<div class="main">
  <div class="matrix-wrap">
    <table class="matrix" id="matrixTable">
      <thead id="matrixHead"></thead>
      <tbody id="matrixBody"></tbody>
    </table>
  </div>

  <div class="queue-area" id="queueArea"></div>
</div>

<footer class="footer">
  岩手県中学生ソフトテニス連盟 大会DXシステム ｜ 30秒ごとに自動更新
</footer>

<script>
const API = "https://script.google.com/macros/s/AKfycbyUQbnMbcFLFRObMbUQ1sKGrhq11GL99io2pGBTAT4X5IBsSpdQPPasOVKxt0HtdFk/exec";
const REFRESH = 30000;

let allMatches = [];
let displayMode = 'all'; // 'all' | 'team' | 'individual'
let courtCount = 16;      // コート面数（デフォルト16）
let refreshTimer = null;

// ============================================================
// Mode Switch
// ============================================================
function setMode(mode) {
  displayMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  render();
}

function onCourtCountChange() {
  courtCount = parseInt(document.getElementById('courtCountSel').value) || 16;
  render();
}

function filterByMode(matches) {
  if (displayMode === 'team') return matches.filter(m => m.round && m.round.indexOf("団体") !== -1);
  if (displayMode === 'individual') return matches.filter(m => m.round && m.round.indexOf("個人") !== -1);
  return matches;
}

// ============================================================
// Fetch
// ============================================================
async function fetchData() {
  try {
    const res = await fetch(API + "?action=getProgress");
    const data = await res.json();
    allMatches = data || [];
    render();
    const now = new Date();
    document.getElementById('updateInfo').textContent =
      `最終更新: ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  } catch (e) {
    document.getElementById('updateInfo').textContent = '⚠ 通信エラー';
  }
}

// ============================================================
// Render
// ============================================================
function render() {
  renderMatrix();
  renderQueues();
}

function renderMatrix() {
  // モードフィルタ適用後、コートが割り当てられている試合を抽出
  const filtered = filterByMode(allMatches);
  const courtMatches = filtered.filter(m =>
    m.court && (m.status === "コート指定済み" || m.status === "試合中" || m.status === "終了")
  );

  // 固定コート列を1〜courtCountで生成
  const courts = [];
  for (let i = 1; i <= courtCount; i++) courts.push(String(i));

  // コート文字列を解析：「1-2」→ [1,2]、「1」→ [1]
  function parseCourtRange(courtStr) {
    const s = String(courtStr).trim();
    if (s.indexOf('-') !== -1) {
      const parts = s.split('-');
      const start = parseInt(parts[0]) || 0;
      const end = parseInt(parts[1]) || 0;
      const result = [];
      for (let i = start; i <= end; i++) result.push(String(i));
      return result;
    }
    return [s];
  }

  // 各試合がどのコートを使うかマッピング
  // courtSlots[row][courtIdx] = match or null or 'span'(結合の続き)
  // まず各試合をコートの最初の番号でグループ化
  const courtFirstMap = {}; // firstCourt → [match, match, ...]
  courtMatches.forEach(m => {
    const range = parseCourtRange(m.court);
    const first = range[0];
    if (!courtFirstMap[first]) courtFirstMap[first] = [];
    courtFirstMap[first].push({ ...m, _courtRange: range });
  });

  // 行数計算
  let maxRows = 0;
  courts.forEach(c => {
    if (courtFirstMap[c]) maxRows = Math.max(maxRows, courtFirstMap[c].length);
  });
  const totalRows = Math.max(maxRows, 6);

  // 各コートの試合をソート
  courts.forEach(c => {
    if (courtFirstMap[c]) {
      courtFirstMap[c] = sortByStatus(courtFirstMap[c]);
    }
  });

  // ヘッダー
  let headHtml = '<tr><th class="row-header"></th>';
  courts.forEach(c => {
    headHtml += `<th>${c}コート</th>`;
  });
  headHtml += '</tr>';
  document.getElementById('matrixHead').innerHTML = headHtml;

  // ボディ：行ごとに構築。結合済みセルはスキップ
  let bodyHtml = '';
  for (let r = 0; r < totalRows; r++) {
    bodyHtml += `<tr><td class="row-header">${r + 1}</td>`;

    // この行で結合済みのコートを追跡
    const spannedCourts = new Set();

    for (let ci = 0; ci < courts.length; ci++) {
      const c = courts[ci];

      // 既に結合セルの一部ならスキップ
      if (spannedCourts.has(c)) continue;

      // このコートのr番目の試合を取得
      const matchList = courtFirstMap[c];
      const m = matchList ? matchList[r] : null;

      if (m && m._courtRange.length > 1) {
        // 複数コート使用 → colspan
        const range = m._courtRange;
        const colspan = range.length;
        // 結合対象のコートをスキップリストに追加
        range.forEach(rc => spannedCourts.add(rc));
        bodyHtml += `<td colspan="${colspan}" style="border:2px solid var(--c-accent);background:var(--c-surface);">${renderCell(m)}</td>`;
      } else if (m) {
        // 1面のみ
        bodyHtml += `<td>${renderCell(m)}</td>`;
      } else {
        bodyHtml += '<td class="cell-empty"></td>';
      }
    }
    bodyHtml += '</tr>';
  }
  document.getElementById('matrixBody').innerHTML = bodyHtml;
}

function sortByStatus(matches) {
  const order = { "終了": 0, "試合中": 1, "コート指定済み": 2 };
  return [...matches].sort((a, b) => (order[a.status] ?? 9) - (order[b.status] ?? 9));
}

function renderCell(m) {
  const isTeam = m.round && m.round.indexOf("団体") !== -1;
  let cls = '';
  let statusText = '';

  if (m.status === "試合中") { cls = 'cell-playing'; statusText = '試合中'; }
  else if (m.status === "コート指定済み") { cls = 'cell-court-done'; statusText = 'コート指定済み'; }
  else if (m.status === "終了") { cls = 'cell-done'; statusText = '終了'; }

  // 短い回戦表示
  let roundShort = m.round || '';
  roundShort = roundShort.replace('男子団体 ', '').replace('男子個人 ', '').replace('女子団体 ', '').replace('女子個人 ', '');

  // チーム名を短縮
  const t1 = shortenName(m.t1);
  const t2 = shortenName(m.t2);

  return `<div class="match-cell ${cls}">
    <div class="cell-round">${roundShort}</div>
    <div class="cell-teams">${t1}vs${t2}</div>
    <div class="cell-status">${statusText}</div>
  </div>`;
}

function shortenName(name) {
  if (!name) return '?';
  // 「チーム名:選手・選手」形式の場合、チーム名だけ取る
  const colon = name.indexOf(':');
  if (colon !== -1) name = name.substring(0, colon);
  // 長すぎる場合は切り詰め
  if (name.length > 6) name = name.substring(0, 5) + '…';
  return name;
}

// ============================================================
// Queue（下部のキュー表示）
// ============================================================
function renderQueues() {
  const filtered = filterByMode(allMatches);
  const orderDone = filtered.filter(m => m.status === "オーダー完了" || m.status === "コート指定待ち");
  const orderPartial = filtered.filter(m => m.status === "オーダー提出");
  const waiting = filtered.filter(m => m.status === "待機中");

  const isTeamOnly = displayMode === 'team';
  const isIndOnly = displayMode === 'individual';

  // 団体・個人に分けて表示
  const splitByType = (list) => {
    const team = list.filter(m => m.round && m.round.indexOf("団体") !== -1);
    const ind = list.filter(m => !m.round || m.round.indexOf("団体") === -1);
    return { team, ind };
  };

  let html = '';

  // ===== コート割り当て待ち =====
  const s1 = splitByType(orderDone);
  html += `<div class="queue-section">
    <div class="queue-title">🏸 まもなく試合開始 — コートの空きを待っています <span class="cnt">${orderDone.length}</span></div>
    <div class="queue-desc">コートが空き次第、上の進行表に表示されます。選手はコート周辺で待機してください。</div>`;
  if (orderDone.length === 0) {
    html += '<div class="queue-empty">現在、コート待ちの試合はありません</div>';
  } else {
    if (s1.team.length > 0) {
      if (!isIndOnly) html += `<div class="queue-type-label">${isTeamOnly ? '' : '団体戦 — '}オーダー提出済み・コート割り当て待ち</div>`;
      html += '<div class="queue-cards">' + s1.team.map(m => queueCard(m, 'q-order-done')).join('') + '</div>';
    }
    if (s1.ind.length > 0) {
      if (!isTeamOnly) html += `<div class="queue-type-label">${isIndOnly ? '' : '個人戦 — '}コート割り当て待ち</div>`;
      html += '<div class="queue-cards">' + s1.ind.map(m => queueCard(m, 'q-order-done')).join('') + '</div>';
    }
  }
  html += '</div>';

  // ===== オーダー受付中（団体戦のみ。個人戦モードでは非表示） =====
  if (!isIndOnly) {
    html += `<div class="queue-section">
      <div class="queue-title">📝 オーダー受付中 — 両チームの提出を待っています <span class="cnt">${orderPartial.length}</span></div>
      <div class="queue-desc">監督は監督ポータルからオーダーを提出してください。両チーム揃い次第「コート待ち」に移ります。</div>`;
    if (orderPartial.length === 0) {
      html += '<div class="queue-empty">現在、オーダー受付中の試合はありません</div>';
    } else {
      html += '<div class="queue-cards">' + orderPartial.map(m => queueCard(m, 'q-order-partial')).join('') + '</div>';
    }
    html += '</div>';
  }

  // ===== この後の試合 =====
  const s3 = splitByType(waiting);
  const waitDesc = isIndOnly
    ? '前の試合が終わり次第、コートが割り当てられます。対戦相手が「○○勝者」の試合は、前の試合結果で決まります。'
    : isTeamOnly
      ? '前の試合が終わり次第、オーダー受付が始まります。対戦相手が「○○勝者」の試合は、前の試合結果で決まります。'
      : '前の試合が終わり次第、順番に進行します。対戦相手が「○○勝者」となっている試合は、前の試合の結果で決まります。';
  html += `<div class="queue-section">
    <div class="queue-title">⏳ この後の試合 <span class="cnt">${waiting.length}</span></div>
    <div class="queue-desc">${waitDesc}</div>`;
  if (waiting.length === 0) {
    html += '<div class="queue-empty">待機中の試合はありません</div>';
  } else {
    if (s3.team.length > 0 && !isIndOnly) {
      if (!isTeamOnly) html += `<div class="queue-type-label">団体戦</div>`;
      html += '<div class="queue-cards">' + s3.team.map(m => queueCard(m, 'q-waiting')).join('') + '</div>';
    }
    if (s3.ind.length > 0 && !isTeamOnly) {
      if (!isIndOnly) html += `<div class="queue-type-label">個人戦</div>`;
      html += '<div class="queue-cards">' + s3.ind.map(m => queueCard(m, 'q-waiting')).join('') + '</div>';
    }
  }
  html += '</div>';

  document.getElementById('queueArea').innerHTML = html;
}

function queueCard(m, cls) {
  const t1 = shortenName(m.t1);
  const t2 = shortenName(m.t2);
  return `<div class="queue-card ${cls}">
    <div class="qc-id">${m.matchId}　${m.round || ''}</div>
    <div class="qc-teams">${t1} vs ${t2}</div>
  </div>`;
}

// ============================================================
// Auto Refresh
// ============================================================
function startAutoRefresh() {
  fetchData();
  refreshTimer = setInterval(fetchData, REFRESH);
}

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    clearInterval(refreshTimer);
  } else {
    fetchData();
    refreshTimer = setInterval(fetchData, REFRESH);
  }
});

window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const urlMode = params.get('mode');
  const urlCourts = params.get('courts');

  // コート面数の設定
  if (urlCourts) {
    courtCount = parseInt(urlCourts) || 16;
  }
  document.getElementById('courtCountSel').value = String(courtCount);

  if (urlMode && ['all', 'team', 'individual'].includes(urlMode)) {
    // 観客用：モード固定、ボタン非表示、ラベル表示、コート数セレクタ非表示
    displayMode = urlMode;
    document.getElementById('modeSwitcher').style.display = 'none';
    document.getElementById('courtCountWrap').style.display = 'none';
    const label = document.getElementById('modeLabel');
    const names = { all: '全種目', team: '団体戦', individual: '個人戦' };
    label.textContent = names[urlMode];
    label.style.display = 'block';
  } else {
    // 運営用：切り替えボタン＋コート数セレクタ表示
    document.getElementById('modeSwitcher').style.display = 'flex';
    document.getElementById('courtCountWrap').style.display = 'flex';
    document.getElementById('modeLabel').style.display = 'none';
  }

  startAutoRefresh();
});
</script>
</body>
</html>
