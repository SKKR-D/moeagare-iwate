<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>団体戦 参加申込｜岩手県中学生ソフトテニス連盟</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#28a745;--green-dark:#1e7e34;--green-light:#e6f4ea;
  --gold:#c8a020;--white:#fff;--gray:#f5f5f0;
  --text:#222;--text-light:#666;--radius:10px;
  --red:#b33030;
}
html{font-size:15px}
body{font-family:'Noto Sans JP',sans-serif;background:var(--gray);color:var(--text);min-height:100vh}

.header{background:linear-gradient(135deg,var(--green-dark),var(--green));color:var(--white);padding:16px 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.header-inner{max-width:800px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
.header-title{display:flex;align-items:center;gap:10px}
.header-title .icon{font-size:1.6rem}
.header-title h1{font-size:1rem;font-weight:700}
.header-title h1 small{display:block;font-size:.7rem;font-weight:500;opacity:.8}
.header-title h1 #headerTournament{display:block;font-size:.82rem;font-weight:900;color:#c8a020;letter-spacing:.02em}
.back-btn{background:rgba(255,255,255,.15);color:var(--white);border:none;padding:8px 14px;border-radius:6px;font-size:.8rem;cursor:pointer;font-family:inherit}

.main{max-width:800px;margin:0 auto;padding:20px}

.card{background:var(--white);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.card h2{font-size:.9rem;font-weight:900;color:var(--green-dark);margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--green)}
.card h3{font-size:.82rem;font-weight:700;color:var(--text);margin:16px 0 8px;padding:6px 10px;background:var(--green-light);border-radius:6px}

.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:.78rem;font-weight:700;color:var(--text-light);margin-bottom:4px}
.form-row label .req{color:var(--red);font-size:.7rem;margin-left:4px}
.form-row input,.form-row select{width:100%;padding:10px 12px;border:2px solid #ddd;border-radius:8px;font-size:.88rem;font-family:inherit;outline:none;transition:border-color .2s}
.form-row input:focus,.form-row select:focus{border-color:var(--green)}
.hint{font-size:.7rem;color:var(--text-light);margin-top:2px}

.radio-group{display:flex;gap:16px;margin-top:4px}
.radio-group label{display:flex;align-items:center;gap:6px;font-size:.88rem;font-weight:500;cursor:pointer}
.radio-group input{width:auto}

.same-check{display:flex;align-items:center;gap:8px;margin:8px 0 4px;font-size:.82rem;font-weight:700;color:var(--green-dark);cursor:pointer}
.same-check input{width:auto}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.grid-2{grid-template-columns:1fr}}

.note-box{background:#fff8e1;border:2px solid var(--gold);border-radius:8px;padding:10px 14px;font-size:.8rem;font-weight:700;color:#7a5d00;margin-bottom:12px}

/* PLAYER CARDS (mobile-first) */
.player-section{margin-top:8px}
.team-block{border:2px solid #e0e0e0;border-radius:var(--radius);margin-bottom:16px;overflow:hidden}
.team-header{background:var(--green-light);padding:10px 14px;font-weight:900;font-size:.88rem;color:var(--green-dark)}
.player-card{padding:12px;border-top:1px solid #eee}
.player-card.disabled{background:#f0f0f0;opacity:.5}
.player-card.disabled input,.player-card.disabled select{pointer-events:none;background:#e8e8e8}
.player-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.player-num{font-size:.85rem;font-weight:900;color:var(--green-dark)}
.vacancy-check{display:inline-flex;align-items:center;gap:5px;font-size:.78rem;font-weight:700;color:var(--red);cursor:pointer;background:#fff5f5;padding:3px 10px;border-radius:20px;border:1.5px solid #e0b0b0}
.vacancy-check input{width:auto;accent-color:var(--red)}
.player-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.player-grid .full{grid-column:1/-1}
.player-grid label{font-size:.7rem;font-weight:700;color:var(--text-light);margin-bottom:2px;display:block}
.player-grid input,.player-grid select{width:100%;padding:8px 10px;border:1.5px solid #ddd;border-radius:6px;font-size:.85rem;font-family:inherit}
.player-grid input:focus,.player-grid select:focus{border-color:var(--green);outline:none}
.jsta-wrap{display:flex;align-items:center;gap:4px}
.jsta-wrap span{font-size:.75rem;color:#888;flex-shrink:0}
.jsta-wrap input{flex:1}
.birth-selects{display:flex;gap:4px}
.birth-selects select{flex:1;padding:8px 4px;border:1.5px solid #ddd;border-radius:6px;font-size:.82rem;font-family:inherit}
.hint-inline{font-size:.65rem;color:var(--text-light);font-weight:500}

/* FEE */
.fee-box{background:var(--green-light);border-radius:var(--radius);padding:16px;text-align:center;margin:16px 0}
.fee-box .amount{font-size:1.6rem;font-weight:900;color:var(--green-dark)}
.fee-box .detail{font-size:.78rem;color:var(--text-light);margin-top:4px}

.btn{display:inline-block;padding:14px 28px;border-radius:8px;font-size:.92rem;font-weight:700;border:none;cursor:pointer;text-align:center;font-family:inherit;transition:all .2s;line-height:1.4}
.btn-green{background:var(--green);color:var(--white)}
.btn-green:hover{background:var(--green-dark)}
.btn-green:disabled{background:#aaa;cursor:not-allowed}
.btn-block{display:block;width:100%}
.btn-outline-green{background:var(--white);color:var(--green-dark);border:2px solid var(--green)}

.status-msg{text-align:center;padding:16px;border-radius:8px;font-size:.88rem;font-weight:700;margin-top:16px;display:none}
.status-msg.success{display:block;background:#d4edda;color:#155724}
.status-msg.success .nav-btns{display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.status-msg.success .nav-btns .btn{font-size:.82rem;padding:10px 20px}
.status-msg.error{display:block;background:#f8d7da;color:#721c24}
.status-msg.sending{display:block;background:var(--green-light);color:var(--green-dark)}

/* CONFIRM MODAL */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:200;overflow-y:auto;padding:20px}
.modal-overlay.show{display:flex;justify-content:center;align-items:flex-start}
.modal-box{background:var(--white);border-radius:12px;max-width:700px;width:100%;padding:24px;margin:40px auto;box-shadow:0 10px 40px rgba(0,0,0,.3);animation:popIn .25s ease}
@keyframes popIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.modal-box h2{font-size:1rem;font-weight:900;color:var(--green-dark);margin-bottom:12px;text-align:center}
.modal-table{width:100%;border-collapse:collapse;font-size:.82rem;margin-bottom:12px}
.modal-table th,.modal-table td{padding:6px 10px;border:1px solid #ddd;text-align:left}
.modal-table th{background:#f5f5f5;font-weight:700;width:110px;color:var(--text-light)}
.modal-section{font-size:.85rem;font-weight:700;color:var(--green-dark);margin:14px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--green)}
.modal-player-table{width:100%;border-collapse:collapse;font-size:.78rem;margin-bottom:8px}
.modal-player-table th,.modal-player-table td{padding:5px 8px;border:1px solid #ddd;text-align:left}
.modal-player-table th{background:var(--green);color:var(--white);font-weight:700}
.modal-btns{display:flex;gap:10px;justify-content:center;margin-top:16px}

.footer{text-align:center;padding:30px 20px;font-size:.7rem;color:var(--text-light)}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-title">
      <span class="icon">🎾</span>
      <h1><small>岩手県中学生ソフトテニス連盟</small><span id="headerTournament"></span>参加申込</h1>
    </div>
    <button class="back-btn" onclick="history.back()">← 戻る</button>
  </div>
</header>

<main class="main">
  <form id="entryForm" onsubmit="return false;">

    <div class="card">
      <h2>基本情報</h2>
      <div class="form-row">
        <label>チーム名（学校名またはクラブ名）<span class="req">※必須</span></label>
        <input type="text" id="teamName" required placeholder="例：○○中学校、○○クラブ">
      </div>
      <div class="form-row">
        <label>男女<span class="req">※必須</span></label>
        <div class="radio-group">
          <label><input type="radio" name="gender" value="男子" required>男子</label>
          <label><input type="radio" name="gender" value="女子">女子</label>
        </div>
      </div>
      <div class="form-row">
        <label>中体連地区<span class="req">※必須</span></label>
        <select id="district" required>
          <option value="">選択してください</option>
          <option>久慈</option><option>二戸</option><option>岩手</option>
          <option>盛岡</option><option>紫波</option><option>花巻</option>
          <option>和賀</option><option>胆江</option><option>一関</option>
          <option>気仙</option><option>遠野</option><option>釜石・大槌</option>
          <option>宮古</option>
        </select>
      </div>
    </div>

    <div class="card">
      <h2>引率・申込責任者</h2>
      <h3>引率責任者</h3>
      <div class="grid-2">
        <div class="form-row">
          <label>氏名<span class="req">※必須</span></label>
          <input type="text" id="leaderName" required>
        </div>
        <div class="form-row">
          <label>役職<span class="req">※必須</span></label>
          <select id="leaderTitle" required>
            <option value="">選択してください</option>
            <option>教職員</option><option>部活動指導員</option><option>外部コーチ</option>
            <option>地域クラブ指導者</option><option>保護者</option>
          </select>
        </div>
      </div>
      <h3>申込責任者</h3>
      <label class="same-check"><input type="checkbox" id="sameAsLeader" onchange="toggleSameAsLeader()">引率責任者と同じ</label>
      <div id="applicantFields">
        <div class="grid-2">
          <div class="form-row">
            <label>氏名<span class="req">※必須</span></label>
            <input type="text" id="applicantName" required>
          </div>
          <div class="form-row">
            <label>役職<span class="req">※必須</span></label>
            <select id="applicantTitle" required>
              <option value="">選択してください</option>
              <option>教職員</option><option>部活動指導員</option><option>外部コーチ</option>
              <option>地域クラブ指導者</option><option>保護者</option>
            </select>
          </div>
        </div>
      </div>
      <div class="grid-2">
        <div class="form-row">
          <label>携帯番号<span class="req">※必須</span></label>
          <input type="tel" id="applicantPhone" required pattern="^0[0-9]{9,10}$" placeholder="09012345678">
          <div class="hint">ハイフンなし半角数字</div>
        </div>
        <div class="form-row">
          <label>メールアドレス<span class="req">※必須</span></label>
          <input type="email" id="applicantEmail" required placeholder="example@mail.com">
          <div class="hint">申込書の控え（PDF）をこのアドレスに送信します</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>エントリーチーム数・参加料</h2>
      <div class="form-row">
        <label>エントリーチーム数<span class="req">※必須</span></label>
        <select id="teamCount" onchange="buildForm()"></select>
      </div>
      <div class="fee-box">
        <div class="amount" id="feeDisplay">---</div>
        <div class="detail" id="feeDetail">読み込み中...</div>
      </div>
    </div>

    <div class="card">
      <h2>監督情報</h2>
      <div class="note-box">※ チーム数分の登録が必須です（複数チームで同じ人を入力しても構いません）</div>
      <div id="coachArea"></div>
    </div>

    <div class="card">
      <h2>選手情報</h2>
      <div class="player-section" id="playerArea"></div>
    </div>

    <!-- 大会実績（条件付き表示） -->
    <div class="card" id="resultsSection" style="display:none">
      <h2>大会実績</h2>
      <div class="form-row">
        <label>県大会レベル以上の実績<span class="req">※必須</span></label>
        <textarea id="tournamentResults" rows="3" style="width:100%;padding:10px;border:2px solid #ddd;border-radius:8px;font-family:inherit;font-size:.88rem" placeholder="実績がない場合は「なし」と入力してください"></textarea>
      </div>
    </div>

    <!-- 書類提出（条件付き表示） -->
    <div class="card" id="uploadSection" style="display:none">
      <h2>書類提出</h2>
      <div class="note-box" id="uploadNote"></div>
      <div class="form-row">
        <label>登録名簿（PDF）<span class="req">※必須</span></label>
        <input type="file" id="uploadFile" accept=".pdf" style="font-size:.85rem">
        <div class="hint">PDFファイルのみ（最大5MB）</div>
      </div>
    </div>

    <button type="button" class="btn btn-green btn-block" id="submitBtn" onclick="showConfirm()">申込データを送信し、PDFの控えを受信する</button>
    <div class="status-msg" id="statusMsg"></div>

  </form>
</main>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal-box">
    <h2>📋 入力内容の確認</h2>
    <div id="confirmContent"></div>
    <div class="modal-btns">
      <button class="btn btn-outline-green" onclick="closeConfirm()">修正する</button>
      <button class="btn btn-green" onclick="doSubmit()">この内容で申し込む</button>
    </div>
  </div>
</div>

<footer class="footer">&copy; 岩手県中学生ソフトテニス連盟</footer>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbwMaX6mOexotFkV6n5Y79QXO9IhDgBRvT4PHuCr9c9j435683_N7G8yKkQPcIi-wXtu/exec';

var TEAM_LABELS = ['A', 'B', 'C', 'D'];
var GRADES = ['1年', '2年', '3年'];
var JUDGE_LEVELS = ['なし', 'jr.'];
var COACH_TITLES = ['教職員', '部活動指導員', '外部コーチ', '地域クラブ指導者'];

var BIRTH_RANGES = {
  '1年': { min: '2013-04-02', max: '2014-04-01' },
  '2年': { min: '2012-04-02', max: '2013-04-01' },
  '3年': { min: '2011-04-02', max: '2012-04-01' }
};

/* ========== SAME AS LEADER ========== */
function toggleSameAsLeader() {
  var checked = document.getElementById('sameAsLeader').checked;
  var fields = document.getElementById('applicantFields');
  var nameEl = document.getElementById('applicantName');
  var titleEl = document.getElementById('applicantTitle');
  if (checked) {
    fields.style.display = 'none';
    nameEl.removeAttribute('required');
    titleEl.removeAttribute('required');
  } else {
    fields.style.display = '';
    nameEl.setAttribute('required', '');
    titleEl.setAttribute('required', '');
  }
}

function getApplicantName() {
  if (document.getElementById('sameAsLeader').checked) return document.getElementById('leaderName').value;
  return document.getElementById('applicantName').value;
}

function getApplicantTitle() {
  if (document.getElementById('sameAsLeader').checked) return document.getElementById('leaderTitle').value;
  return document.getElementById('applicantTitle').value;
}

/* ========== BUILD FORM ========== */
function buildForm() {
  var count = parseInt(document.getElementById('teamCount').value);
  buildCoaches(count);
  buildPlayers(count);
  calcFee(count);
}

function buildCoaches(count) {
  var area = document.getElementById('coachArea');
  var html = '';
  var i, t;
  for (i = 0; i < count; i++) {
    html += '<h3>' + TEAM_LABELS[i] + 'チーム監督<span class="req">※必須</span></h3>';
    html += '<div class="grid-2">';
    html += '<div class="form-row"><label>氏名</label><input type="text" id="coach_name_' + i + '" required></div>';
    html += '<div class="form-row"><label>役職</label><select id="coach_title_' + i + '" required><option value="">選択</option>';
    for (t = 0; t < COACH_TITLES.length; t++) html += '<option>' + COACH_TITLES[t] + '</option>';
    html += '</select></div></div>';
  }
  area.innerHTML = html;
}

function buildPlayers(count) {
  var area = document.getElementById('playerArea');
  var html = '';
  var i, j, pid, g, jl;

  for (i = 0; i < count; i++) {
    html += '<div class="team-block">';
    html += '<div class="team-header">' + TEAM_LABELS[i] + 'チーム（各チーム最大8名）</div>';

    for (j = 0; j < 8; j++) {
      pid = 't' + i + '_' + j;
      var isRequired = (j < 4);
      var reqAttr = isRequired ? ' required' : '';

      html += '<div class="player-card" id="card_' + pid + '">';
      html += '<div class="player-top">';
      html += '<span class="player-num">No.' + (j + 1) + '</span>';
      if (j >= 4) {
        html += '<label class="vacancy-check"><input type="checkbox" id="vacant_' + pid + '" onchange="toggleVacant(\'' + pid + '\')">欠員にする</label>';
      }
      html += '</div>';
      html += '<div class="player-grid">';
      html += '<div class="full"><label>氏名</label><input type="text" id="name_' + pid + '"' + reqAttr + ' placeholder="氏名"></div>';
      html += '<div class="full"><label>ふりがな</label><input type="text" id="kana_' + pid + '"' + reqAttr + ' placeholder="ふりがな"></div>';
      html += '<div><label>学年</label><select id="grade_' + pid + '"' + reqAttr + ' onchange="onGradeChange(\'' + pid + '\')"><option value="">--</option>';
      for (g = 0; g < GRADES.length; g++) html += '<option>' + GRADES[g] + '</option>';
      html += '</select></div>';
      html += '<div class="full"><label>生年月日　<span class="hint-inline">※先に学年を選択してください</span></label><div class="birth-selects" id="birth_wrap_' + pid + '">';
      html += '<select id="birth_y_' + pid + '"' + reqAttr + ' disabled><option value="">-- 学年を選択 --</option></select>';
      html += '<select id="birth_m_' + pid + '"' + reqAttr + '><option value="">月</option>';
      var bm;
      for (bm = 1; bm <= 12; bm++) html += '<option value="' + bm + '">' + bm + '月</option>';
      html += '</select>';
      html += '<select id="birth_d_' + pid + '"' + reqAttr + '><option value="">日</option>';
      var bd;
      for (bd = 1; bd <= 31; bd++) html += '<option value="' + bd + '">' + bd + '日</option>';
      html += '</select>';
      html += '</div></div>';
      html += '<div><label>日連登録番号</label><div class="jsta-wrap"><span>JSTA</span><input type="text" id="jstc_' + pid + '"' + reqAttr + ' pattern="^[0-9]{8}$" placeholder="12345678"></div></div>';
      html += '<div><label>審判資格</label><select id="judge_' + pid + '">';
      for (jl = 0; jl < JUDGE_LEVELS.length; jl++) html += '<option>' + JUDGE_LEVELS[jl] + '</option>';
      html += '</select></div>';
      html += '</div></div>';
    }
    html += '</div>';
  }
  area.innerHTML = html;
}

/* ========== GRADE → BIRTH RANGE ========== */
var GRADE_YEARS = {
  '1年': [2013, 2014],
  '2年': [2012, 2013],
  '3年': [2011, 2012]
};
var HEISEI_MAP = { 2011: '平成23', 2012: '平成24', 2013: '平成25', 2014: '平成26' };

function onGradeChange(pid) {
  var grade = document.getElementById('grade_' + pid).value;
  var yearSel = document.getElementById('birth_y_' + pid);
  yearSel.innerHTML = '<option value="">年</option>';

  if (grade && GRADE_YEARS[grade]) {
    var years = GRADE_YEARS[grade];
    var yi;
    for (yi = 0; yi < years.length; yi++) {
      var y = years[yi];
      var opt = document.createElement('option');
      opt.value = String(y);
      opt.textContent = y + '年（' + HEISEI_MAP[y] + '年）';
      yearSel.appendChild(opt);
    }
    yearSel.disabled = false;
  } else {
    yearSel.disabled = true;
    yearSel.innerHTML = '<option value="">-- 学年を選択 --</option>';
  }
  yearSel.value = '';
  document.getElementById('birth_m_' + pid).value = '';
  document.getElementById('birth_d_' + pid).value = '';
}

function getBirthValue(pid) {
  var y = document.getElementById('birth_y_' + pid).value;
  var m = document.getElementById('birth_m_' + pid).value;
  var d = document.getElementById('birth_d_' + pid).value;
  if (!y || !m || !d) return '';
  return y + '-' + (m.length === 1 ? '0' + m : m) + '-' + (d.length === 1 ? '0' + d : d);
}

/* ========== VACANCY TOGGLE ========== */
function toggleVacant(pid) {
  var checked = document.getElementById('vacant_' + pid).checked;
  var card = document.getElementById('card_' + pid);
  var inputs = card.querySelectorAll('input[type="text"], select');
  var k;
  if (checked) {
    card.classList.add('disabled');
    for (k = 0; k < inputs.length; k++) { if (inputs[k].type !== 'checkbox') { inputs[k].removeAttribute('required'); inputs[k].value = ''; } }
  } else {
    card.classList.remove('disabled');
  }
}

/* ========== FEE ========== */
function calcFee(count) {
  var total = count * feePerTeam;
  document.getElementById('feeDisplay').textContent = total.toLocaleString() + '円';
  document.getElementById('feeDetail').textContent = count + 'チーム × ' + feePerTeam.toLocaleString() + '円';
}

/* ========== TEAM RULES VALIDATION ========== */
function validateTeamRules() {
  var teamCount = parseInt(document.getElementById('teamCount').value);
  var i, j, pid, vcb, activeCount;
  for (i = 0; i < teamCount; i++) {
    activeCount = 0;
    for (j = 0; j < 8; j++) {
      pid = 't' + i + '_' + j;
      vcb = document.getElementById('vacant_' + pid);
      if (!vcb || !vcb.checked) activeCount++;
    }
    if (activeCount < 4) {
      alert(TEAM_LABELS[i] + 'チームの有効選手が' + activeCount + '名です。最低4名必要です。');
      return false;
    }
    if (teamCount > 1 && i < teamCount - 1 && activeCount < 6) {
      alert(TEAM_LABELS[i] + 'チームの有効選手が' + activeCount + '名です。最下位チーム以外は最低6名必要です。');
      return false;
    }
  }
  return true;
}

/* ========== VALIDATE ========== */
function validateForm() {
  var form = document.getElementById('entryForm');
  if (!form.checkValidity()) { form.reportValidity(); return false; }
  if (!validateTeamRules()) return false;

  var teamCount = parseInt(document.getElementById('teamCount').value);
  var i, j, pid, jstcEl, vcb, gradeVal;
  for (i = 0; i < teamCount; i++) {
    for (j = 0; j < 8; j++) {
      pid = 't' + i + '_' + j;
      vcb = document.getElementById('vacant_' + pid);
      if (vcb && vcb.checked) continue;
      jstcEl = document.getElementById('jstc_' + pid);
      if (jstcEl && jstcEl.value && !/^[0-9]{8}$/.test(jstcEl.value)) {
        alert(TEAM_LABELS[i] + 'チーム No.' + (j + 1) + 'の日連登録番号は半角数字8桁で入力してください。');
        jstcEl.focus(); return false;
      }
      var birthVal = getBirthValue(pid);
      gradeVal = document.getElementById('grade_' + pid).value;
      if (birthVal && gradeVal && BIRTH_RANGES[gradeVal]) {
        if (birthVal < BIRTH_RANGES[gradeVal].min || birthVal > BIRTH_RANGES[gradeVal].max) {
          alert(TEAM_LABELS[i] + 'チーム No.' + (j + 1) + 'の生年月日が' + gradeVal + 'の範囲外です。\n' + gradeVal + '：' + BIRTH_RANGES[gradeVal].min + ' ～ ' + BIRTH_RANGES[gradeVal].max);
          document.getElementById('birth_y_' + pid).focus(); return false;
        }
      }
    }
  }
  var phone = document.getElementById('applicantPhone').value;
  if (!/^0[0-9]{9,10}$/.test(phone)) { alert('携帯番号の形式が正しくありません。'); document.getElementById('applicantPhone').focus(); return false; }
  return true;
}

/* ========== BUILD PAYLOAD ========== */
function buildPayload() {
  var teamCount = parseInt(document.getElementById('teamCount').value);
  var i, j, pid;

  var genderEls = document.getElementsByName('gender');
  var gender = '';
  for (i = 0; i < genderEls.length; i++) { if (genderEls[i].checked) gender = genderEls[i].value; }

  var coaches = [];
  for (i = 0; i < teamCount; i++) {
    coaches.push({
      team: TEAM_LABELS[i],
      name: document.getElementById('coach_name_' + i).value,
      title: document.getElementById('coach_title_' + i).value
    });
  }

  var teams = [];
  for (i = 0; i < teamCount; i++) {
    var players = [];
    for (j = 0; j < 8; j++) {
      pid = 't' + i + '_' + j;
      var vcb = document.getElementById('vacant_' + pid);
      var isVacant = (vcb && vcb.checked);
      if (isVacant) {
        players.push({ no: j + 1, name: '', kana: '', grade: '', birth: '', jstc: '', judge: '', vacant: true });
      } else {
        players.push({
          no: j + 1,
          name: document.getElementById('name_' + pid).value,
          kana: document.getElementById('kana_' + pid).value,
          grade: document.getElementById('grade_' + pid).value,
          birth: getBirthValue(pid),
          jstc: 'JSTA' + document.getElementById('jstc_' + pid).value,
          judge: document.getElementById('judge_' + pid).value,
          vacant: false
        });
      }
    }
    teams.push({ teamLabel: TEAM_LABELS[i], players: players });
  }

  return {
    entryType: 'team',
    tournamentName: tournamentParam,
    entryLabel: labelParam,
    teamName: document.getElementById('teamName').value,
    gender: gender,
    district: document.getElementById('district').value,
    leader: { name: document.getElementById('leaderName').value, title: document.getElementById('leaderTitle').value },
    applicant: {
      name: getApplicantName(),
      title: getApplicantTitle(),
      phone: document.getElementById('applicantPhone').value,
      email: document.getElementById('applicantEmail').value
    },
    coaches: coaches,
    teams: teams,
    fee: teamCount * feePerTeam,
    feePerTeam: feePerTeam,
    tournamentResults: document.getElementById('tournamentResults') ? document.getElementById('tournamentResults').value : '',
    timestamp: new Date().toISOString()
  };
}

/* ========== CONFIRM MODAL ========== */
function showConfirm() {
  if (!validateForm()) return;

  if (hasOption('書類提出')) {
    var fileInput = document.getElementById('uploadFile');
    if (!fileInput.files || fileInput.files.length === 0) {
      alert('登録名簿のPDFファイルを選択してください。');
      fileInput.focus();
      return;
    }
    if (fileInput.files[0].size > 5 * 1024 * 1024) {
      alert('ファイルサイズは5MB以下にしてください。');
      return;
    }
  }

  var payload = buildPayload();
  var btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '確認中...';

  var checkUrl = GAS_URL + '?action=checkDuplicate'
    + '&tournament=' + encodeURIComponent(payload.tournamentName)
    + '&label=' + encodeURIComponent(payload.entryLabel)
    + '&teamName=' + encodeURIComponent(payload.teamName)
    + '&gender=' + encodeURIComponent(payload.gender);

  fetch(checkUrl).then(function(res) {
    return res.json();
  }).then(function(data) {
    btn.disabled = false;
    btn.textContent = '申込データを送信し、PDFの控えを受信する';
    if (data.isDuplicate) {
      alert('この大会・種別・チーム名・男女の組み合わせで既に申込済みです。\n修正が必要な場合は連盟幹事までご連絡ください。');
      return;
    }
    showConfirmModal(payload);
  }).catch(function() {
    btn.disabled = false;
    btn.textContent = '申込データを送信し、PDFの控えを受信する';
    showConfirmModal(payload);
  });
}

function showConfirmModal(payload) {
  var html = '';

  html += '<table class="modal-table">';
  html += '<tr><th>チーム名</th><td>' + esc(payload.teamName) + '</td></tr>';
  html += '<tr><th>男女</th><td>' + esc(payload.gender) + '</td></tr>';
  html += '<tr><th>地区</th><td>' + esc(payload.district) + '</td></tr>';
  html += '<tr><th>引率責任者</th><td>' + esc(payload.leader.name) + '（' + esc(payload.leader.title) + '）</td></tr>';
  html += '<tr><th>申込責任者</th><td>' + esc(payload.applicant.name) + '（' + esc(payload.applicant.title) + '）</td></tr>';
  html += '<tr><th>メール</th><td>' + esc(payload.applicant.email) + '</td></tr>';
  html += '<tr><th>参加料合計</th><td>' + payload.fee.toLocaleString() + '円</td></tr>';
  html += '</table>';

  html += '<div class="modal-section">監督情報</div>';
  html += '<table class="modal-player-table"><tr><th>チーム</th><th>氏名</th><th>役職</th></tr>';
  var ci;
  for (ci = 0; ci < payload.coaches.length; ci++) {
    html += '<tr><td>' + esc(payload.coaches[ci].team) + '</td><td>' + esc(payload.coaches[ci].name) + '</td><td>' + esc(payload.coaches[ci].title) + '</td></tr>';
  }
  html += '</table>';

  var ti, tj, team, pl;
  for (ti = 0; ti < payload.teams.length; ti++) {
    team = payload.teams[ti];
    html += '<div class="modal-section">' + team.teamLabel + 'チーム 選手情報</div>';
    html += '<table class="modal-player-table"><tr><th>No.</th><th>氏名</th><th>学年</th><th>生年月日</th><th>日連登録番号</th></tr>';
    for (tj = 0; tj < team.players.length; tj++) {
      pl = team.players[tj];
      if (pl.vacant) {
        html += '<tr><td>' + pl.no + '</td><td colspan="4" style="color:#999">（欠員）</td></tr>';
      } else if (pl.name) {
        html += '<tr><td>' + pl.no + '</td><td>' + esc(pl.name) + '</td><td>' + esc(pl.grade) + '</td><td>' + esc(pl.birth) + '</td><td>' + esc(pl.jstc) + '</td></tr>';
      }
    }
    html += '</table>';
  }

  document.getElementById('confirmContent').innerHTML = html;
  document.getElementById('confirmModal').classList.add('show');
}

function closeConfirm() {
  document.getElementById('confirmModal').classList.remove('show');
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

/* ========== SUBMIT ========== */
function doSubmit() {
  closeConfirm();
  var payload = buildPayload();

  var fileInput = document.getElementById('uploadFile');
  if (hasOption('書類提出') && fileInput && fileInput.files && fileInput.files.length > 0) {
    var file = fileInput.files[0];
    var reader = new FileReader();
    reader.onload = function() {
      var base64 = reader.result.split(',')[1];
      payload.uploadedFile = { name: file.name, type: file.type, data: base64 };
      sendData(payload);
    };
    reader.readAsDataURL(file);
  } else {
    sendData(payload);
  }
}

function sendData(payload) {
  var btn = document.getElementById('submitBtn');
  var msg = document.getElementById('statusMsg');
  btn.disabled = true;
  msg.className = 'status-msg sending';
  msg.textContent = '送信中...しばらくお待ちください（PDFの生成に少しお時間をいただきます）';

  fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload)
  }).then(function(res) {
    return res.json();
  }).then(function(data) {
    if (data.status === 'ok') {
      try {
        var applied = JSON.parse(localStorage.getItem('appliedEvents') || '[]');
        applied.push({ tournament: payload.tournamentName, label: payload.entryLabel, team: payload.teamName, date: new Date().toISOString() });
        localStorage.setItem('appliedEvents', JSON.stringify(applied));
      } catch(e) {}

      msg.className = 'status-msg success';
      msg.innerHTML = '申込を受け付けました。<br>申込書の控え（PDF）を申込責任者のメールアドレスに送信しましたのでご確認ください。'
        + '<div class="nav-btns">'
        + '<a class="btn btn-green" href="index.html">年間予定に戻る</a>'
        + (tournamentParam ? '<a class="btn btn-outline-green" href="detail.html?date=' + (urlParams.get('date') || '') + '">大会要項に戻る</a>' : '')
        + '</div>';
      btn.style.display = 'none';
    } else {
      throw new Error(data.message || 'エラーが発生しました');
    }
  }).catch(function(err) {
    msg.className = 'status-msg error';
    msg.textContent = '送信に失敗しました：' + err.message;
    btn.disabled = false;
  });
}

/* ========== INIT ========== */
var urlParams = new URLSearchParams(window.location.search);
var tournamentParam = urlParams.get('tournament') || '';
var labelParam = urlParams.get('label') || '団体戦';
var feePerTeam = parseInt(urlParams.get('fee')) || 8000;
var maxTeams = parseInt(urlParams.get('maxTeams')) || 4;
var optionsStr = urlParams.get('options') || '';
var entryOptions = optionsStr ? optionsStr.split(',') : [];

function hasOption(name) {
  var i;
  for (i = 0; i < entryOptions.length; i++) {
    if (entryOptions[i].indexOf(name) >= 0) return true;
  }
  return false;
}

if (tournamentParam) {
  document.getElementById('headerTournament').textContent = tournamentParam + '　' + labelParam + '　';
  document.title = tournamentParam + ' ' + labelParam + ' 参加申込｜岩手県中学生ソフトテニス連盟';
} else {
  document.getElementById('headerTournament').textContent = labelParam + '　';
}

/* 他県選択の追加 */
if (hasOption('他県')) {
  var distSel = document.getElementById('district');
  var extraGroup = document.createElement('optgroup');
  extraGroup.label = '※他県からの申し込み';
  var prefectures = ['青森県', '秋田県', '宮城県', '山形県', '福島県'];
  var pi;
  for (pi = 0; pi < prefectures.length; pi++) {
    var pOpt = document.createElement('option');
    pOpt.value = prefectures[pi];
    pOpt.textContent = prefectures[pi];
    extraGroup.appendChild(pOpt);
  }
  distSel.appendChild(extraGroup);
}

/* 実績入力の表示 */
if (hasOption('実績')) {
  document.getElementById('resultsSection').style.display = '';
  document.getElementById('tournamentResults').setAttribute('required', '');
}

/* 書類提出の表示 */
if (hasOption('書類提出')) {
  document.getElementById('uploadSection').style.display = '';
  document.getElementById('uploadFile').setAttribute('required', '');
  var noteText = '登録名簿のPDFファイルを提出してください。';
  if (hasOption('日連')) noteText = '日連の登録名簿（PDF）を提出してください。';
  if (hasOption('スポ少')) noteText = 'スポ少登録名簿（PDF）を提出してください。';
  document.getElementById('uploadNote').textContent = noteText;
}

(function() {
  var sel = document.getElementById('teamCount');
  sel.innerHTML = '';
  var labels = ['A', 'B', 'C', 'D'];
  var i, opt;
  for (i = 1; i <= maxTeams; i++) {
    opt = document.createElement('option');
    opt.value = String(i);
    opt.textContent = i + 'チーム（' + labels.slice(0, i).join('・') + '）';
    if (i === 1) opt.selected = true;
    sel.appendChild(opt);
  }
})();

buildForm();
</script>
