<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本部管理 | ソフトテニス大会DX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Design Tokens — 本部PC用（ライト・業務UI）
   ============================================================ */
:root {
  --c-bg:       #f3f4f6;
  --c-surface:  #ffffff;
  --c-surface2: #f9fafb;
  --c-accent:   #0d7c3e;
  --c-accent-light: #e6f5ec;
  --c-accent2:  #0969b2;
  --c-accent2-light: #e4f0fb;
  --c-danger:   #d32f2f;
  --c-danger-light: #fdecea;
  --c-warn:     #f57c00;
  --c-warn-light: #fff4e5;
  --c-text:     #1a1a1a;
  --c-text2:    #5f6b7a;
  --c-border:   #d0d7de;
  --r-sm: 6px;
  --r-md: 10px;
  --shadow: 0 1px 4px rgba(0,0,0,.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,.08);
  --font-ja: 'Noto Sans JP', sans-serif;
  --font-en: 'Inter', sans-serif;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font-ja);
  background: var(--c-bg);
  color: var(--c-text);
  font-size: 14px;
}

/* ============================================================
   Layout
   ============================================================ */
.app-header {
  background: var(--c-surface); border-bottom: 1px solid var(--c-border);
  padding: 12px 24px; display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow);
}
.app-header .logo { font-size: 18px; font-weight: 900; display: flex; align-items: center; gap: 8px; }
.app-header .logo span { font-size: 22px; }

.tab-bar {
  display: flex; gap: 4px; margin-left: 32px;
}
.tab-btn {
  padding: 8px 18px; border: none; border-radius: var(--r-sm);
  font-size: 13px; font-weight: 600; cursor: pointer;
  background: transparent; color: var(--c-text2); transition: all .15s;
  font-family: var(--font-ja);
}
.tab-btn:hover { background: var(--c-surface2); }
.tab-btn.active { background: var(--c-accent); color: #fff; }

.refresh-btn {
  margin-left: auto; padding: 8px 16px; border: 1px solid var(--c-border);
  border-radius: var(--r-sm); background: var(--c-surface); cursor: pointer;
  font-size: 13px; font-weight: 600; color: var(--c-text2); font-family: var(--font-ja);
  transition: all .15s;
}
.refresh-btn:hover { background: var(--c-surface2); }

.main { max-width: 1200px; margin: 0 auto; padding: 20px 24px; }

.panel { display: none; }
.panel.active { display: block; animation: fadeIn .2s ease-out; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ============================================================
   Progress Table
   ============================================================ */
.filter-bar {
  display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center;
}
.filter-bar select, .filter-bar input {
  padding: 7px 12px; border: 1px solid var(--c-border); border-radius: var(--r-sm);
  font-size: 13px; font-family: var(--font-ja); background: var(--c-surface); color: var(--c-text);
}
.filter-bar .match-count { margin-left: auto; font-size: 12px; color: var(--c-text2); }

.data-table {
  width: 100%; border-collapse: collapse; background: var(--c-surface);
  border-radius: var(--r-md); overflow: hidden; box-shadow: var(--shadow);
}
.data-table th {
  background: #374151; color: #fff; padding: 10px 12px;
  font-size: 12px; font-weight: 700; text-align: left; white-space: nowrap;
}
.data-table td {
  padding: 10px 12px; border-bottom: 1px solid var(--c-border);
  font-size: 13px; vertical-align: middle;
}
.data-table tr:hover td { background: var(--c-surface2); }
.data-table tr:last-child td { border-bottom: none; }

.status-tag {
  display: inline-block; font-size: 11px; font-weight: 700;
  padding: 2px 8px; border-radius: 10px; white-space: nowrap;
}
.status-tag.waiting      { background: var(--c-warn-light); color: var(--c-warn); }
.status-tag.order-partial { background: #fff0e0; color: #e65100; }
.status-tag.order        { background: var(--c-accent2-light); color: var(--c-accent2); }
.status-tag.court-wait   { background: #fce4ec; color: #c62828; }
.status-tag.court-done   { background: #e8eaf6; color: #3949ab; }
.status-tag.progress     { background: #ede9fe; color: #7c3aed; }
.status-tag.done         { background: var(--c-accent-light); color: var(--c-accent); }

.inline-select {
  padding: 4px 8px; border: 1px solid var(--c-border); border-radius: var(--r-sm);
  font-size: 12px; font-family: var(--font-ja); background: var(--c-surface);
  cursor: pointer;
}

.action-btn {
  padding: 5px 10px; border: 1px solid var(--c-border); border-radius: var(--r-sm);
  background: var(--c-surface); font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: var(--font-ja); transition: all .1s;
  white-space: nowrap;
}
.action-btn:hover { background: var(--c-surface2); }
.action-btn.primary { background: var(--c-accent); color: #fff; border-color: var(--c-accent); }
.action-btn.primary:hover { background: #0a6331; }
.action-btn.danger { color: var(--c-danger); border-color: var(--c-danger); }

/* ============================================================
   Modal
   ============================================================ */
.modal-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.4); display: none;
  align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--c-surface); border-radius: var(--r-md);
  box-shadow: var(--shadow-md); width: 90%; max-width: 560px;
  max-height: 90vh; overflow-y: auto; padding: 24px;
}
.modal h2 { font-size: 18px; font-weight: 800; margin-bottom: 16px; }
.modal-close {
  float: right; background: none; border: none; font-size: 20px;
  cursor: pointer; color: var(--c-text2); padding: 4px;
}

.form-group { margin-bottom: 14px; }
.form-group label {
  display: block; font-size: 12px; font-weight: 700; color: var(--c-text2);
  margin-bottom: 4px;
}
.form-group select, .form-group input {
  width: 100%; padding: 10px 12px; border: 1px solid var(--c-border);
  border-radius: var(--r-sm); font-size: 14px; font-family: var(--font-ja);
  background: var(--c-surface);
}
.form-row { display: flex; gap: 12px; }
.form-row .form-group { flex: 1; }

.match-pair-group {
  background: var(--c-surface2); border-radius: var(--r-sm);
  padding: 12px; margin-bottom: 10px;
}
.match-pair-group .pair-title {
  font-size: 12px; font-weight: 700; color: var(--c-accent); margin-bottom: 8px;
}

.btn-submit {
  display: block; width: 100%; padding: 12px; border: none; border-radius: var(--r-sm);
  background: var(--c-accent); color: #fff; font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: var(--font-ja); margin-top: 16px;
}
.btn-submit:hover { background: #0a6331; }
.btn-submit:disabled { opacity: .4; cursor: not-allowed; }

/* ============================================================
   Score Input
   ============================================================ */
.score-header {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--c-surface2); padding: 12px; border-radius: var(--r-sm);
  margin-bottom: 12px;
}
.score-header .team-name { font-size: 16px; font-weight: 800; }
.score-header .vs { color: var(--c-text2); font-size: 13px; }
.game-input-row {
  display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
}
.game-input-row .game-label {
  font-size: 13px; font-weight: 700; color: var(--c-text2); width: 80px;
}
.game-input-row input[type="number"] {
  width: 60px; padding: 8px; text-align: center; border: 1px solid var(--c-border);
  border-radius: var(--r-sm); font-size: 16px; font-weight: 700; font-family: var(--font-en);
}
.game-input-row input[type="number"]:disabled {
  background: #f3f4f6; color: #999; cursor: not-allowed;
}
.game-input-row .dash { font-size: 18px; color: var(--c-text2); }
.op-check-row {
  display: flex; gap: 20px; margin: 4px 0 12px 80px; font-size: .8rem;
}
.op-check-row label { display: flex; align-items: center; gap: 4px; cursor: pointer; font-weight: 600; color: var(--c-text2); }
.score-match-divider {
  border: none; border-top: 1px dashed var(--c-border); margin: 12px 0 8px;
}

/* ============================================================
   Toast / Loading
   ============================================================ */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--c-surface); border: 1px solid var(--c-border);
  border-radius: var(--r-md); padding: 12px 20px; font-size: 14px; font-weight: 600;
  box-shadow: var(--shadow-md); z-index: 9998; opacity: 0;
  transform: translateY(20px); transition: all .3s ease;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { border-color: var(--c-accent); color: var(--c-accent); }
.toast.error   { border-color: var(--c-danger); color: var(--c-danger); }
</style>
</head>
<body>

<!-- ========== Header ========== -->
<header class="app-header">
  <div class="logo"><span>🎾</span> 大会本部管理</div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('progress')">進行管理</button>
    <button class="tab-btn" onclick="switchTab('order')">オーダー入力</button>
    <button class="tab-btn" onclick="switchTab('score')">スコア入力</button>
  </div>
  <button class="refresh-btn" onclick="refreshAll()">🔄 更新</button>
</header>

<!-- ========== Toast ========== -->
<div class="toast" id="toast"></div>

<!-- ========== Main ========== -->
<div class="main">

  <!-- ============ Panel 1: 進行管理 ============ -->
  <div class="panel active" id="panelProgress">
    <div class="filter-bar">
      <select id="filterStatus" onchange="renderProgressTable()">
        <option value="">すべてのステータス</option>
        <option value="待機中">待機中</option>
        <option value="オーダー提出">オーダー提出</option>
        <option value="オーダー完了">オーダー完了</option>
        <option value="コート指定待ち">コート指定待ち</option>
        <option value="コート指定済み">コート指定済み</option>
        <option value="試合中">試合中</option>
        <option value="終了">終了</option>
      </select>
      <select id="filterType" onchange="renderProgressTable()">
        <option value="">すべての種別</option>
        <option value="団体">団体戦</option>
        <option value="個人">個人戦</option>
      </select>
      <input type="text" id="filterSearch" placeholder="チーム名で検索..." oninput="renderProgressTable()">
      <span class="match-count" id="matchCount"></span>
    </div>
    <table class="data-table" id="progressTable">
      <thead>
        <tr>
          <th>試合ID</th>
          <th>種別</th>
          <th>ステータス</th>
          <th>コート</th>
          <th>チーム1</th>
          <th>チーム2</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="progressBody"></tbody>
    </table>
  </div>

  <!-- ============ Panel 2: オーダー入力 ============ -->
  <div class="panel" id="panelOrder">
    <div class="filter-bar">
      <select id="orderMatchSelect" onchange="onOrderMatchChange()">
        <option value="">-- 試合を選択 --</option>
      </select>
      <select id="orderTeamSelect" onchange="onOrderTeamChange()">
        <option value="">-- チームを選択 --</option>
      </select>
    </div>

    <div id="orderFormArea" style="display:none;">
      <div id="orderRosterInfo" style="margin-bottom:16px;"></div>
      <div class="match-pair-group">
        <div class="pair-title">第1マッチ</div>
        <div class="form-row">
          <div class="form-group"><label>A</label><select id="adm_slot_0" class="adm-slot" onchange="onAdmSlotChange()"></select></div>
          <div class="form-group"><label>B</label><select id="adm_slot_1" class="adm-slot" onchange="onAdmSlotChange()"></select></div>
        </div>
      </div>
      <div class="match-pair-group">
        <div class="pair-title">第2マッチ</div>
        <div class="form-row">
          <div class="form-group"><label>A</label><select id="adm_slot_2" class="adm-slot" onchange="onAdmSlotChange()"></select></div>
          <div class="form-group"><label>B</label><select id="adm_slot_3" class="adm-slot" onchange="onAdmSlotChange()"></select></div>
        </div>
      </div>
      <div class="match-pair-group">
        <div class="pair-title">第3マッチ
          <label style="margin-left:12px;font-size:12px;color:var(--c-warn);font-weight:600;cursor:pointer;">
            <input type="checkbox" id="admOpenCheck" onchange="onAdmOpenChange()" style="accent-color:var(--c-warn);"> オープン
          </label>
        </div>
        <div class="form-row">
          <div class="form-group"><label>A</label><select id="adm_slot_4" class="adm-slot" onchange="onAdmSlotChange()"></select></div>
          <div class="form-group"><label>B</label><select id="adm_slot_5" class="adm-slot" onchange="onAdmSlotChange()"></select></div>
        </div>
      </div>
      <button class="btn-submit" id="admOrderSubmitBtn" onclick="submitAdminOrder()" disabled>オーダーを送信</button>
    </div>
  </div>

  <!-- ============ Panel 3: スコア入力 ============ -->
  <div class="panel" id="panelScore">
    <div class="filter-bar">
      <select id="scoreMatchSelect" onchange="onScoreMatchChange()">
        <option value="">-- 試合を選択 --</option>
      </select>
    </div>

    <div id="scoreFormArea" style="display:none;">
      <div class="score-header" id="scoreHeader"></div>

      <!-- ゲーム数（団体・個人共通） -->
      <div class="form-group" style="margin-top:8px;">
        <label>ゲーム数</label>
        <select id="scoreMaxGames" style="width:200px;" onchange="onGameCountChange()">
          <option value="5">5ゲームマッチ</option>
          <option value="7" selected>7ゲームマッチ</option>
        </select>
      </div>

      <!-- 団体戦専用：方式選択 -->
      <div id="scoreTeamOptions" style="display:none;">
        <div class="form-group">
          <label>方式</label>
          <div style="display:flex; gap:8px;">
            <label style="display:flex;align-items:center;gap:4px;cursor:pointer;font-weight:600;font-size:.85rem;">
              <input type="radio" name="scorePlayMode" value="first_to_2" checked onchange="validateScore()"> 2点先取終了
            </label>
            <label style="display:flex;align-items:center;gap:4px;cursor:pointer;font-weight:600;font-size:.85rem;">
              <input type="radio" name="scorePlayMode" value="all" onchange="validateScore()"> 全3試合行う
            </label>
          </div>
        </div>
      </div>

      <!-- スコア入力行 -->
      <div id="scoreGameRows"></div>

      <button class="btn-submit" id="scoreSubmitBtn" onclick="submitScore()" disabled>スコアを送信</button>
    </div>
  </div>

</div>

<!-- ========== Court Change Modal ========== -->
<div class="modal-overlay" id="courtModal">
  <div class="modal">
    <button class="modal-close" onclick="closeCourtModal()">×</button>
    <h2>コート割当</h2>
    <div class="form-group">
      <label>試合ID</label>
      <input type="text" id="courtMatchId" readonly>
    </div>
    <div class="form-group">
      <label>コート番号</label>
      <input type="text" id="courtInput" placeholder="例: 1, A, 第3コート" oninput="previewCourtConflict()">
    </div>
    <div id="courtConflictPreview" style="font-size:12px;margin-bottom:12px;min-height:20px;"></div>
    <button class="btn-submit" id="courtSubmitBtn" onclick="submitCourtChange()">割り当て</button>
  </div>
</div>

<!-- ============================================================
     JavaScript
     ============================================================ -->
<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyxWcuPgEZZS5zma0xxXOu-LvC0GTP4-ArSao_Y119N7zP_k_xWf6PoSGd5RIeaGLIy/exec";

// ============================================================
// State
// ============================================================
const state = {
  progress: [],       // 進行管理データ
  entries: {},        // チーム名 → 選手一覧
  venues: {},
  selectedOrderMatch: null,
  selectedOrderTeam: null,
  selectedScoreMatch: null,
};

// ============================================================
// API
// ============================================================
const apiGet = async (action, params = {}) => {
  const url = new URL(GAS_URL);
  url.searchParams.set('action', action);
  Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));
  const res = await fetch(url.toString());
  return res.json();
};
const apiPost = async (payload) => {
  const res = await fetch(GAS_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(payload)
  });
  return res.json();
};

// ============================================================
// Toast
// ============================================================
const showToast = (msg, type = "success") => {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove('show'), 2500);
};

// ============================================================
// Tab Switch
// ============================================================
const switchTab = (name) => {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('panel' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
};

// ============================================================
// Init
// ============================================================
const refreshAll = async () => {
  try {
    const [progress, venues] = await Promise.all([
      apiGet('getProgress'),
      apiGet('getVenues')
    ]);
    state.progress = progress || [];
    state.venues = venues || {};
    renderProgressTable();
    populateMatchSelects();
    showToast("データを更新しました");
  } catch (err) {
    showToast("通信エラー: " + err.message, "error");
  }
};

// ページ読み込み時に自動取得
window.addEventListener('DOMContentLoaded', refreshAll);

// ============================================================
// Panel 1: 進行管理
// ============================================================
const getStatusClass = (status) => {
  if (status === "待機中") return "waiting";
  if (status === "オーダー提出") return "order-partial";
  if (status === "オーダー完了") return "order";
  if (status === "コート指定待ち") return "court-wait";
  if (status === "コート指定済み") return "court-done";
  if (status === "試合中") return "progress";
  if (status === "終了") return "done";
  return "waiting";
};

const renderProgressTable = () => {
  const filterStatus = document.getElementById('filterStatus').value;
  const filterType   = document.getElementById('filterType').value;
  const filterSearch = document.getElementById('filterSearch').value.trim();

  let data = state.progress;
  if (filterStatus) data = data.filter(m => m.status === filterStatus);
  if (filterType)   data = data.filter(m => m.round.indexOf(filterType) !== -1);
  if (filterSearch)  data = data.filter(m =>
    m.t1.indexOf(filterSearch) !== -1 || m.t2.indexOf(filterSearch) !== -1
  );

  document.getElementById('matchCount').textContent = `${data.length}件 / 全${state.progress.length}件`;

  const tbody = document.getElementById('progressBody');
  tbody.innerHTML = data.map(m => {
    const sClass = getStatusClass(m.status);
    const isTeam = m.round.indexOf("団体") !== -1;
    const typeLabel = isTeam ? "団体" : "個人";

    const statusOptions = isTeam
      ? ['待機中','オーダー提出','オーダー完了','コート指定待ち','コート指定済み','試合中','終了']
      : ['待機中','コート指定待ち','コート指定済み','試合中','終了'];

    return `<tr>
      <td><strong style="font-family:var(--font-en);">${m.matchId}</strong></td>
      <td>${typeLabel}</td>
      <td><span class="status-tag ${sClass}">${m.status || "待機中"}</span></td>
      <td>${m.court || "-"}</td>
      <td>${m.t1}</td>
      <td>${m.t2}</td>
      <td style="white-space:nowrap;">
        <select class="inline-select" onchange="changeStatus('${m.matchId}', this.value)">
          <option value="">変更▼</option>
          ${statusOptions.map(s => `<option value="${s}">${s}</option>`).join('')}
        </select>
        <button class="action-btn" onclick="openCourtModal('${m.matchId}', '${m.court || ''}')">コート</button>
      </td>
    </tr>`;
  }).join('');
};

const changeStatus = async (matchId, newStatus) => {
  if (!newStatus) return;

  let winner = null;

  // 「終了」に変更する場合、勝者を選択させる
  if (newStatus === "終了") {
    const match = allProgress.find(m => m.matchId === matchId);
    if (match) {
      const t1Short = shortenForPrompt(match.t1);
      const t2Short = shortenForPrompt(match.t2);
      const choice = prompt(
        `【${matchId}】勝者を選んでください\n\n` +
        `1: ${t1Short}\n` +
        `2: ${t2Short}\n` +
        `0: 勝者なし（スキップ）\n\n` +
        `番号を入力:`
      );
      if (choice === null) { await refreshAll(); return; } // キャンセル
      if (choice === '1') winner = match.t1;
      else if (choice === '2') winner = match.t2;
      // 0 or その他はwinner=null → 勝者反映なし
    }
  }

  try {
    const payload = { type: "UPDATE_PROGRESS", matchId, status: newStatus };
    if (winner) payload.winner = winner;
    const result = await apiPost(payload);
    if (result.error || result.status === "error") {
      showToast(result.error || result.message, "error");
      await refreshAll();
      return;
    }
    const finalStatus = result.newStatus || newStatus;
    showToast(`${matchId} → ${finalStatus}` + (winner ? ` (勝者: ${shortenForPrompt(winner)})` : ''));
    await refreshAll();
  } catch (err) {
    showToast("エラー: " + err.message, "error");
  }
};

// 長いチーム名を短縮（プロンプト表示用）
const shortenForPrompt = (name) => {
  if (!name) return '?';
  const colon = name.indexOf(':');
  if (colon !== -1) return name.substring(0, colon);
  if (name.length > 15) return name.substring(0, 12) + '…';
  return name;
};

// --- Court Modal ---
const openCourtModal = (matchId, currentCourt) => {
  document.getElementById('courtMatchId').value = matchId;
  document.getElementById('courtInput').value = currentCourt;
  document.getElementById('courtModal').classList.add('show');
};
const closeCourtModal = () => {
  document.getElementById('courtModal').classList.remove('show');
  document.getElementById('courtConflictPreview').innerHTML = '';
};

const previewCourtConflict = () => {
  const court = document.getElementById('courtInput').value.trim();
  const matchId = document.getElementById('courtMatchId').value;
  const preview = document.getElementById('courtConflictPreview');
  const btn = document.getElementById('courtSubmitBtn');

  if (!court) {
    preview.innerHTML = '';
    btn.disabled = false;
    return;
  }

  const sameCourt = state.progress.filter(m =>
    String(m.court) === court && m.matchId !== matchId &&
    (m.status === "試合中" || m.status === "コート指定済み")
  );

  const hasPlaying = sameCourt.some(m => m.status === "試合中");
  const hasAssigned = sameCourt.some(m => m.status === "コート指定済み");

  if (sameCourt.length === 0) {
    preview.innerHTML = `<span style="color:var(--c-accent);">✅ コート「${court}」は空いています</span>`;
    btn.disabled = false;
  } else if (hasAssigned) {
    // 「コート指定済み」が既にある → 割当不可
    const lines = sameCourt.map(m => `${m.matchId}（${m.status}）`).join(', ');
    preview.innerHTML = `<span style="color:var(--c-danger);">⛔ 割当不可：コート「${court}」に「コート指定済み」の試合があります → ${lines}</span>`;
    btn.disabled = true;
  } else if (hasPlaying) {
    // 「試合中」のみ → 次の試合として割当OK
    const lines = sameCourt.map(m => `${m.matchId}（${m.status}）`).join(', ');
    preview.innerHTML = `<span style="color:var(--c-accent2);">✅ 次の試合として割当可能（現在: ${lines}）</span>`;
    btn.disabled = false;
  }
};

const submitCourtChange = async () => {
  const matchId = document.getElementById('courtMatchId').value;
  const court = document.getElementById('courtInput').value.trim();
  if (!court) { showToast("コート番号を入力してください", "error"); return; }

  try {
    const result = await apiPost({ type: "UPDATE_PROGRESS", matchId, court });
    if (result.error || result.status === "error") {
      showToast(result.error || result.message, "error");
      return;
    }
    closeCourtModal();
    showToast(`${matchId} → コート: ${court}（${result.newStatus || "更新済み"}）`);
    // サーバーから最新データを再取得して確実に同期
    await refreshAll();
  } catch (err) {
    showToast("エラー: " + err.message, "error");
  }
};

// ============================================================
// Panel 2: オーダー入力
// ============================================================
const populateMatchSelects = () => {
  // 団体戦のみオーダー対象
  const teamMatches = state.progress.filter(m => m.round.indexOf("団体") !== -1 && m.status !== "終了");

  const orderSel = document.getElementById('orderMatchSelect');
  orderSel.innerHTML = '<option value="">-- 試合を選択 --</option>' +
    teamMatches.map(m => `<option value="${m.matchId}">${m.matchId}　${m.t1} vs ${m.t2}　[${m.status}]</option>`).join('');

  // スコア入力用：全試合
  const scoreSel = document.getElementById('scoreMatchSelect');
  scoreSel.innerHTML = '<option value="">-- 試合を選択 --</option>' +
    state.progress.filter(m => m.status !== "終了").map(m =>
      `<option value="${m.matchId}">${m.matchId}　${m.t1} vs ${m.t2}　[${m.round}]</option>`
    ).join('');
};

const onOrderMatchChange = async () => {
  const matchId = document.getElementById('orderMatchSelect').value;
  document.getElementById('orderFormArea').style.display = matchId ? 'block' : 'none';
  if (!matchId) return;

  const match = state.progress.find(m => m.matchId === matchId);
  state.selectedOrderMatch = match;

  // チーム選択を更新
  const teamSel = document.getElementById('orderTeamSelect');
  teamSel.innerHTML = `<option value="">-- チームを選択 --</option>
    <option value="${match.t1}">${match.t1}</option>
    <option value="${match.t2}">${match.t2}</option>`;
  teamSel.value = "";

  // スロットリセット
  for (let s = 0; s < 6; s++) {
    const sel = document.getElementById(`adm_slot_${s}`);
    sel.innerHTML = '<option value="">--</option>';
    sel.disabled = false;
  }
  document.getElementById('admOpenCheck').checked = false;
  document.getElementById('admOrderSubmitBtn').disabled = true;
};

const onOrderTeamChange = async () => {
  const teamName = document.getElementById('orderTeamSelect').value;
  if (!teamName) return;
  state.selectedOrderTeam = teamName;

  // エントリーからロスター取得（キャッシュなければ取得）
  if (!state.entries[teamName]) {
    try {
      const data = await apiGet('getDashboardData', { teamName });
      Object.assign(state.entries, data.teamRosters || {});
    } catch (err) {
      showToast("ロスター取得エラー", "error");
      return;
    }
  }

  const roster = state.entries[teamName] || [];
  document.getElementById('orderRosterInfo').innerHTML =
    `<div style="font-size:12px;color:var(--c-text2);margin-bottom:4px;">登録メンバー（${roster.length}名）</div>
     <div style="display:flex;flex-wrap:wrap;gap:4px;">${roster.map(p => `<span style="font-size:12px;padding:2px 8px;background:var(--c-surface2);border-radius:10px;">${p}</span>`).join('')}</div>`;

  // スロットに選手リスト設定
  for (let s = 0; s < 6; s++) {
    const sel = document.getElementById(`adm_slot_${s}`);
    sel.value = "";
    sel.disabled = false;
  }
  document.getElementById('admOpenCheck').checked = false;
  rebuildAdmSelects(roster);
};

const rebuildAdmSelects = (roster) => {
  if (!roster) roster = state.entries[state.selectedOrderTeam] || [];
  const currentValues = [];
  for (let s = 0; s < 6; s++) {
    currentValues.push(document.getElementById(`adm_slot_${s}`).value);
  }

  for (let s = 0; s < 6; s++) {
    const sel = document.getElementById(`adm_slot_${s}`);
    if (sel.disabled) continue;
    const myValue = currentValues[s];
    const usedByOthers = currentValues.filter((v, i) => v && i !== s);

    sel.innerHTML = '<option value="">-- 選択 --</option>';
    roster.forEach(p => {
      if (!usedByOthers.includes(p) || p === myValue) {
        const opt = document.createElement('option');
        opt.value = p; opt.textContent = p;
        if (p === myValue) opt.selected = true;
        sel.appendChild(opt);
      }
    });
  }
  validateAdmOrder();
};

const onAdmSlotChange = () => rebuildAdmSelects();

const onAdmOpenChange = () => {
  const checked = document.getElementById('admOpenCheck').checked;
  document.getElementById('adm_slot_4').disabled = checked;
  document.getElementById('adm_slot_5').disabled = checked;
  if (checked) {
    document.getElementById('adm_slot_4').value = "";
    document.getElementById('adm_slot_5').value = "";
  }
  rebuildAdmSelects();
};

const validateAdmOrder = () => {
  const isOpen = document.getElementById('admOpenCheck').checked;
  const maxSlot = isOpen ? 4 : 6;
  let filled = 0;
  for (let s = 0; s < maxSlot; s++) {
    if (document.getElementById(`adm_slot_${s}`).value) filled++;
  }
  document.getElementById('admOrderSubmitBtn').disabled = (filled !== maxSlot);
};

const submitAdminOrder = async () => {
  const matchId = document.getElementById('orderMatchSelect').value;
  const teamName = state.selectedOrderTeam;
  if (!matchId || !teamName) return;

  const isOpen = document.getElementById('admOpenCheck').checked;
  const order = [];
  for (let s = 0; s < 6; s++) {
    if (isOpen && s >= 4) order.push("オープン");
    else order.push(document.getElementById(`adm_slot_${s}`).value);
  }

  try {
    const result = await apiPost({ type: "SUBMIT_ORDER", matchId, entityName: teamName, order });
    showToast(result.updated ? "オーダーを更新しました" : "オーダーを送信しました");
    await refreshAll();
  } catch (err) {
    showToast("エラー: " + err.message, "error");
  }
};

// ============================================================
// Panel 3: スコア入力
// ============================================================
const onScoreMatchChange = () => {
  const matchId = document.getElementById('scoreMatchSelect').value;
  document.getElementById('scoreFormArea').style.display = matchId ? 'block' : 'none';
  if (!matchId) return;

  const match = state.progress.find(m => m.matchId === matchId);
  state.selectedScoreMatch = match;
  const isTeam = match.round.indexOf("団体") !== -1;

  // チーム名を短縮表示（個人戦の「チーム名:選手A・選手B」対応）
  const shortName = (name) => {
    if (!name) return '?';
    const c = name.indexOf(':');
    return c !== -1 ? name.substring(0, c) : name;
  };

  document.getElementById('scoreHeader').innerHTML = `
    <span class="team-name" style="color:var(--c-accent2);">${shortName(match.t1)}</span>
    <span class="vs">vs</span>
    <span class="team-name" style="color:#ea580c;">${shortName(match.t2)}</span>
  `;

  // 団体戦オプション表示/非表示
  document.getElementById('scoreTeamOptions').style.display = isTeam ? 'block' : 'none';

  // スコア行を生成
  renderScoreRows(match, isTeam);
  document.getElementById('scoreSubmitBtn').disabled = true;
};

const renderScoreRows = (match, isTeam) => {
  const container = document.getElementById('scoreGameRows');
  container.innerHTML = '';
  const maxG = parseInt(document.getElementById('scoreMaxGames').value) || 7;
  const maxScore = maxG === 7 ? 4 : 3;

  if (isTeam) {
    for (let i = 0; i < 3; i++) {
      let html = `<hr class="score-match-divider">
        <div class="game-input-row">
          <span class="game-label">第${i + 1}マッチ</span>
          <input type="number" id="scoreL_${i}" min="0" max="${maxScore}" value="" placeholder="0" oninput="clampAndValidate(this, ${maxScore})">
          <span class="dash">-</span>
          <input type="number" id="scoreR_${i}" min="0" max="${maxScore}" value="" placeholder="0" oninput="clampAndValidate(this, ${maxScore})">
        </div>`;

      // 第3マッチのみオープンチェック
      if (i === 2) {
        html += `<div class="op-check-row">
          <label><input type="checkbox" id="scoreOP_L" onchange="onOPChange()"> ${match.t1.indexOf(':')!==-1?match.t1.substring(0,match.t1.indexOf(':')):match.t1} OP(不戦敗)</label>
          <label><input type="checkbox" id="scoreOP_R" onchange="onOPChange()"> ${match.t2.indexOf(':')!==-1?match.t2.substring(0,match.t2.indexOf(':')):match.t2} OP(不戦敗)</label>
        </div>`;
      }
      container.innerHTML += html;
    }
  } else {
    // 個人戦：1試合分
    container.innerHTML = `
      <div class="game-input-row" style="margin-top:8px;">
        <span class="game-label">スコア</span>
        <input type="number" id="scoreL_0" min="0" max="${maxScore}" value="" placeholder="0" oninput="clampAndValidate(this, ${maxScore})">
        <span class="dash">-</span>
        <input type="number" id="scoreR_0" min="0" max="${maxScore}" value="" placeholder="0" oninput="clampAndValidate(this, ${maxScore})">
      </div>`;
  }
};

// 入力値をmax以下にクランプしてからバリデーション
const clampAndValidate = (el, maxVal) => {
  if (el.value !== '' && parseInt(el.value) > maxVal) el.value = maxVal;
  if (el.value !== '' && parseInt(el.value) < 0) el.value = 0;
  validateScore();
};

// ゲーム数変更時にスコア行を再生成
const onGameCountChange = () => {
  const match = state.selectedScoreMatch;
  if (!match) return;
  const isTeam = match.round.indexOf("団体") !== -1;
  renderScoreRows(match, isTeam);
  document.getElementById('scoreSubmitBtn').disabled = true;
};

const onOPChange = () => {
  const opL = document.getElementById('scoreOP_L')?.checked || false;
  const opR = document.getElementById('scoreOP_R')?.checked || false;
  const sL = document.getElementById('scoreL_2');
  const sR = document.getElementById('scoreR_2');

  if (opL || opR) {
    sL.disabled = true; sR.disabled = true;
    sL.value = ''; sR.value = '';
  } else {
    sL.disabled = false; sR.disabled = false;
  }
  validateScore();
};

const validateScore = () => {
  const match = state.selectedScoreMatch;
  if (!match) return;
  const isTeam = match.round.indexOf("団体") !== -1;

  if (!isTeam) {
    // 個人戦：1試合分が入力されていればOK
    const l = document.getElementById('scoreL_0').value;
    const r = document.getElementById('scoreR_0').value;
    document.getElementById('scoreSubmitBtn').disabled = (l === '' || r === '');
    return;
  }

  // 団体戦：方式に応じたバリデーション
  const playMode = document.querySelector('input[name="scorePlayMode"]:checked')?.value || 'first_to_2';

  // 第1・第2マッチの入力チェック
  let winsL = 0, winsR = 0;
  let m1m2Valid = true;
  for (let i = 0; i < 2; i++) {
    const l = document.getElementById(`scoreL_${i}`).value;
    const r = document.getElementById(`scoreR_${i}`).value;
    if (l === '' || r === '') { m1m2Valid = false; continue; }
    const gL = parseInt(l), gR = parseInt(r);
    if (gL > gR) winsL++;
    else if (gR > gL) winsR++;
  }

  // 2点先取で勝敗確定したか判定
  const decided = playMode === 'first_to_2' && (winsL >= 2 || winsR >= 2);

  // 第3マッチの入力欄の有効/無効を制御
  const sL3 = document.getElementById('scoreL_2');
  const sR3 = document.getElementById('scoreR_2');
  const opL = document.getElementById('scoreOP_L');
  const opR = document.getElementById('scoreOP_R');

  if (decided) {
    // 勝敗確定 → 第3マッチを無効化・クリア
    sL3.disabled = true; sR3.disabled = true;
    sL3.value = ''; sR3.value = '';
    if (opL) { opL.disabled = true; opL.checked = false; }
    if (opR) { opR.disabled = true; opR.checked = false; }
  } else {
    // 未確定 → OPチェック状態に応じて制御
    if (opL) opL.disabled = false;
    if (opR) opR.disabled = false;
    const isOP = (opL?.checked || false) || (opR?.checked || false);
    sL3.disabled = isOP;
    sR3.disabled = isOP;
  }

  // バリデーション結果
  let valid = m1m2Valid;
  if (!decided) {
    // 第3マッチも必要
    const isOP = (opL?.checked || false) || (opR?.checked || false);
    if (!isOP) {
      if (sL3.value === '' || sR3.value === '') valid = false;
    }
  }

  document.getElementById('scoreSubmitBtn').disabled = !valid;
};

const submitScore = async () => {
  const match = state.selectedScoreMatch;
  if (!match) return;

  const isTeam = match.round.indexOf("団体") !== -1;
  const maxG = parseInt(document.getElementById('scoreMaxGames').value) || 7;
  const winG = maxG === 7 ? 4 : 3;

  if (isTeam) {
    // 団体戦 → TEAM_FINAL_SUMMARY
    const playMode = document.querySelector('input[name="scorePlayMode"]:checked')?.value || 'first_to_2';
    const opL = document.getElementById('scoreOP_L')?.checked || false;
    const opR = document.getElementById('scoreOP_R')?.checked || false;
    const circles = ['⓪','①','②','③','④','⑤','⑥','⑦'];
    const winChar = circles[winG] || '④';

    const matchResults = [];
    let winsL = 0, winsR = 0;

    for (let i = 0; i < 3; i++) {
      // 2点先取で勝敗確定済みなら第3マッチをスキップ
      if (i === 2 && playMode === 'first_to_2' && (winsL >= 2 || winsR >= 2)) {
        break;
      }

      // 第3マッチのOP処理
      if (i === 2 && (opL || opR)) {
        if (opL && !opR) {
          winsR++;
          matchResults.push({
            A:'(OP)', B:'(OP)', C:'', D:'',
            gL:0, gR:winG, winner:'R',
            displayScore:`R - ${winChar}`,
            uiScoreHtml:`R - ${winChar}`
          });
        } else if (opR && !opL) {
          winsL++;
          matchResults.push({
            A:'', B:'', C:'(OP)', D:'(OP)',
            gL:winG, gR:0, winner:'L',
            displayScore:`${winChar} - R`,
            uiScoreHtml:`${winChar} - R`
          });
        } else {
          // 両方OP
          matchResults.push({
            A:'(OP)', B:'(OP)', C:'(OP)', D:'(OP)',
            gL:0, gR:0, winner:'D',
            displayScore:'R - R',
            uiScoreHtml:'R - R'
          });
        }
        continue;
      }

      const gL = parseInt(document.getElementById(`scoreL_${i}`).value) || 0;
      const gR = parseInt(document.getElementById(`scoreR_${i}`).value) || 0;
      const winner = gL > gR ? 'L' : gR > gL ? 'R' : 'D';
      if (winner === 'L') winsL++;
      else if (winner === 'R') winsR++;

      const gL_str = winner === 'L' ? (circles[gL] || gL) : gL;
      const gR_str = winner === 'R' ? (circles[gR] || gR) : gR;

      matchResults.push({
        A:'', B:'', C:'', D:'',
        gL, gR, winner,
        displayScore: `${gL_str}-${gR_str}`,
        uiScoreHtml: `${gL_str} - ${gR_str}`
      });
    }

    try {
      await apiPost({
        type: "TEAM_FINAL_SUMMARY",
        matchId: match.matchId,
        court: match.court || "",
        teamLNo: "", teamL: match.t1,
        teamRNo: "", teamR: match.t2,
        winsL, winsR,
        matchResults
      });
      showToast(`${match.matchId} のスコアを送信しました（${winsL}-${winsR}）`);
      await refreshAll();
    } catch (err) {
      showToast("エラー: " + err.message, "error");
    }
  } else {
    // 個人戦 → MATCH_RESULT
    const gL = parseInt(document.getElementById('scoreL_0').value) || 0;
    const gR = parseInt(document.getElementById('scoreR_0').value) || 0;

    // 個人戦のチーム名分割
    const parseEntry = (raw) => {
      if (!raw) return { team: '', pA: '', pB: '' };
      const c = raw.indexOf(':');
      if (c === -1) return { team: raw, pA: '', pB: '' };
      const team = raw.substring(0, c).trim();
      const ps = raw.substring(c + 1).trim().split('・');
      return { team, pA: (ps[0]||'').trim(), pB: (ps[1]||'').trim() };
    };
    const e1 = parseEntry(match.t1);
    const e2 = parseEntry(match.t2);

    try {
      await apiPost({
        type: "MATCH_RESULT",
        matchId: match.matchId,
        meta: { matchType: e1.pB ? "ダブルス" : "シングルス", court: match.court || "" },
        teams: { L: e1.team || match.t1, R: e2.team || match.t2 },
        teamNos: { L: "", R: "" },
        names: { A: e1.pA, B: e1.pB, C: e2.pA, D: e2.pB },
        maxG, gL, gR,
        log: []
      });
      showToast(`${match.matchId} のスコアを送信しました（${gL}-${gR}）`);
      await refreshAll();
    } catch (err) {
      showToast("エラー: " + err.message, "error");
    }
  }
};
</script>

</html>
