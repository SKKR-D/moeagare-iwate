<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大会速報 | ソフトテニス大会DX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --c-bg: #f0f2f5;
  --c-surface: #ffffff;
  --c-surface2: #f7f8fa;
  --c-text: #1a1a1a;
  --c-text2: #5f6b7a;
  --c-border: #e0e4e8;
  --c-accent: #0d7c3e;
  --c-accent-light: #e6f5ec;
  --c-accent2: #0969b2;
  --c-accent2-light: #e4f0fb;
  --c-warn: #f57c00;
  --c-warn-light: #fff4e5;
  --c-purple: #7c3aed;
  --c-purple-light: #ede9fe;
  --c-done: #6b7280;
  --c-done-light: #f3f4f6;
  --c-live: #dc2626;
  --r-md: 12px;
  --shadow: 0 1px 4px rgba(0,0,0,.06);
  --font-ja: 'Noto Sans JP', sans-serif;
  --font-en: 'Inter', sans-serif;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-ja); background: var(--c-bg); color: var(--c-text); min-height: 100vh; }

/* ========== Header ========== */
.site-header {
  background: linear-gradient(135deg, #1e3a5f, #0d7c3e);
  color: #fff; padding: 20px 16px; text-align: center;
  position: sticky; top: 0; z-index: 50;
  box-shadow: 0 2px 12px rgba(0,0,0,.15);
}
.site-header h1 { font-size: 1.3rem; font-weight: 900; letter-spacing: .5px; }
.site-header .sub { font-size: 0.75rem; opacity: .8; margin-top: 4px; }
.live-dot {
  display: inline-block; width: 8px; height: 8px; background: #ef4444;
  border-radius: 50%; margin-right: 6px; animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
.update-info {
  font-size: 0.7rem; opacity: .7; margin-top: 6px;
}

/* ========== Controls ========== */
.controls {
  display: flex; gap: 6px; padding: 12px 16px; flex-wrap: wrap;
  max-width: 700px; margin: 0 auto; align-items: center;
}
.filter-chip {
  padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 700;
  border: 1.5px solid var(--c-border); background: var(--c-surface);
  cursor: pointer; transition: all .15s; color: var(--c-text2);
}
.filter-chip:active { transform: scale(.95); }
.filter-chip.active { background: var(--c-text); color: #fff; border-color: var(--c-text); }
.auto-badge {
  margin-left: auto; font-size: 0.7rem; color: var(--c-text2);
  display: flex; align-items: center; gap: 4px;
}

/* ========== Match Cards ========== */
.card-container {
  max-width: 700px; margin: 0 auto; padding: 0 12px 80px;
}
.section-label {
  font-size: 0.8rem; font-weight: 800; color: var(--c-text2);
  padding: 12px 4px 6px; display: flex; align-items: center; gap: 6px;
  border-bottom: 1px solid var(--c-border); margin-bottom: 8px;
}
.section-label .cnt {
  background: var(--c-surface2); padding: 1px 8px; border-radius: 10px;
  font-size: 0.7rem;
}

.match-card {
  background: var(--c-surface); border: 1px solid var(--c-border);
  border-radius: var(--r-md); margin-bottom: 8px; overflow: hidden;
  box-shadow: var(--shadow); transition: all .15s;
}
.match-card .card-top {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; border-bottom: 1px solid var(--c-border);
  background: var(--c-surface2);
}
.match-card .match-id {
  font-family: var(--font-en); font-size: 0.75rem; font-weight: 700;
  color: var(--c-text2);
}
.match-card .round-text {
  font-size: 0.75rem; color: var(--c-text2); flex: 1;
}
.match-card .court-tag {
  font-size: 0.7rem; font-weight: 700; padding: 2px 8px;
  border-radius: 8px; background: #e2e8f0; color: #475569;
}
.match-card .court-tag.has-court {
  background: var(--c-accent2-light); color: var(--c-accent2);
}

.match-card .card-body {
  padding: 12px;
}
.matchup-row {
  display: flex; align-items: center; gap: 8px; font-weight: 700;
  font-size: 0.95rem; line-height: 1.4;
}
.matchup-row .team { flex: 1; }
.matchup-row .team.left { text-align: right; color: var(--c-accent2); }
.matchup-row .team.right { text-align: left; color: #ea580c; }
.matchup-row .vs-badge {
  font-size: 0.65rem; font-weight: 800; color: var(--c-text2);
  background: var(--c-surface2); padding: 2px 8px; border-radius: 8px;
  flex-shrink: 0;
}

/* Status badges */
.status-badge {
  font-size: 0.7rem; font-weight: 800; padding: 3px 10px;
  border-radius: 10px; white-space: nowrap;
}
.st-waiting { background: var(--c-warn-light); color: var(--c-warn); }
.st-order-partial { background: #fff0e0; color: #e65100; }
.st-order { background: var(--c-accent2-light); color: var(--c-accent2); }
.st-court-wait { background: #fce4ec; color: #c62828; }
.st-court-done { background: #e8eaf6; color: #3949ab; }
.st-playing { background: #fef2f2; color: var(--c-live); animation: playingPulse 2s infinite; }
@keyframes playingPulse { 0%,100% { opacity: 1; } 50% { opacity: .7; } }
.st-done { background: var(--c-done-light); color: var(--c-done); }

/* ========== Empty / Loading ========== */
.empty-msg {
  text-align: center; padding: 40px 16px; color: var(--c-text2); font-size: 0.9rem;
}
.loading-bar {
  height: 3px; background: var(--c-accent); position: fixed; top: 0; left: 0;
  z-index: 100; transition: width .3s; border-radius: 0 2px 2px 0;
}

/* ========== Footer ========== */
.site-footer {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--c-surface); border-top: 1px solid var(--c-border);
  padding: 8px 16px; text-align: center; font-size: 0.7rem; color: var(--c-text2);
  z-index: 50;
}
</style>
</head>
<body>

<div class="loading-bar" id="loadingBar" style="width:0%;"></div>

<header class="site-header">
  <h1>🎾 ソフトテニス大会速報</h1>
  <div class="sub"><span class="live-dot"></span>LIVE — 試合状況をリアルタイムで更新</div>
  <div class="update-info" id="updateInfo">読み込み中...</div>
</header>

<div class="controls">
  <button class="filter-chip active" data-filter="all" onclick="setFilter('all')">すべて</button>
  <button class="filter-chip" data-filter="playing" onclick="setFilter('playing')">🔴 試合中</button>
  <button class="filter-chip" data-filter="team" onclick="setFilter('team')">団体戦</button>
  <button class="filter-chip" data-filter="individual" onclick="setFilter('individual')">個人戦</button>
  <button class="filter-chip" data-filter="done" onclick="setFilter('done')">終了</button>
  <div class="auto-badge">🔄 30秒で自動更新</div>
</div>

<div class="card-container" id="cardContainer">
  <div class="empty-msg">読み込み中...</div>
</div>

<footer class="site-footer">
  岩手県中学生ソフトテニス連盟 大会DXシステム
</footer>

<script>
const API = "https://script.google.com/macros/s/AKfycbyxWcuPgEZZS5zma0xxXOu-LvC0GTP4-ArSao_Y119N7zP_k_xWf6PoSGd5RIeaGLIy/exec";
const REFRESH_INTERVAL = 30000;

let allMatches = [];
let currentFilter = 'all';
let refreshTimer = null;

// ============================================================
// Data Fetch
// ============================================================
async function fetchData() {
  const bar = document.getElementById('loadingBar');
  bar.style.width = '30%';

  try {
    const res = await fetch(API + "?action=getProgress");
    bar.style.width = '70%';
    const data = await res.json();
    allMatches = data || [];
    bar.style.width = '100%';
    setTimeout(() => { bar.style.width = '0%'; }, 400);

    const now = new Date();
    document.getElementById('updateInfo').textContent =
      `最終更新: ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;

    renderCards();
  } catch (e) {
    bar.style.width = '0%';
    document.getElementById('updateInfo').textContent = '⚠ 通信エラー — 再試行中...';
  }
}

// ============================================================
// Filter
// ============================================================
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.filter === f);
  });
  renderCards();
}

function applyFilter(matches) {
  if (currentFilter === 'all') return matches.filter(m => m.status !== "終了");
  if (currentFilter === 'playing') return matches.filter(m => m.status === "試合中");
  if (currentFilter === 'team') return matches.filter(m => m.round && m.round.indexOf("団体") !== -1);
  if (currentFilter === 'individual') return matches.filter(m => m.round && m.round.indexOf("個人") !== -1);
  if (currentFilter === 'done') return matches.filter(m => m.status === "終了");
  return matches;
}

// ============================================================
// Render
// ============================================================
function getStatusInfo(status) {
  const map = {
    "待機中":       { cls: "st-waiting",      label: "待機中" },
    "オーダー提出": { cls: "st-order-partial", label: "オーダー提出" },
    "オーダー完了": { cls: "st-order",         label: "オーダー完了" },
    "コート指定待ち": { cls: "st-court-wait",  label: "コート待ち" },
    "コート指定済み": { cls: "st-court-done",  label: "コート指定済" },
    "試合中":       { cls: "st-playing",       label: "🔴 試合中" },
    "終了":         { cls: "st-done",          label: "終了" }
  };
  return map[status] || { cls: "st-waiting", label: status || "待機中" };
}

function renderCards() {
  const container = document.getElementById('cardContainer');
  const filtered = applyFilter(allMatches);

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-msg">該当する試合はありません</div>';
    return;
  }

  // グループ分け：試合中 → コート指定済み → その他進行中 → 終了
  const playing = filtered.filter(m => m.status === "試合中");
  const courtDone = filtered.filter(m => m.status === "コート指定済み");
  const preparing = filtered.filter(m =>
    m.status !== "試合中" && m.status !== "コート指定済み" && m.status !== "終了"
  );
  const done = filtered.filter(m => m.status === "終了");

  let html = '';

  if (playing.length > 0) {
    html += renderSection("🔴 試合中", playing.length, playing);
  }
  if (courtDone.length > 0) {
    html += renderSection("📍 次の試合（コート指定済み）", courtDone.length, courtDone);
  }
  if (preparing.length > 0) {
    html += renderSection("⏳ 準備中", preparing.length, preparing);
  }
  if (done.length > 0) {
    html += renderSection("✅ 終了", done.length, done);
  }

  container.innerHTML = html;
}

function renderSection(title, count, matches) {
  let html = `<div class="section-label">${title} <span class="cnt">${count}</span></div>`;
  matches.forEach(m => { html += renderCard(m); });
  return html;
}

function renderCard(m) {
  const st = getStatusInfo(m.status);
  const isTeam = m.round && m.round.indexOf("団体") !== -1;
  const courtText = m.court ? m.court + "コート" : "未定";
  const courtClass = m.court ? "has-court" : "";

  return `
    <div class="match-card">
      <div class="card-top">
        <span class="match-id">${m.matchId}</span>
        <span class="round-text">${m.round || ""}</span>
        <span class="court-tag ${courtClass}">${courtText}</span>
        <span class="status-badge ${st.cls}">${st.label}</span>
      </div>
      <div class="card-body">
        <div class="matchup-row">
          <span class="team left">${m.t1}</span>
          <span class="vs-badge">VS</span>
          <span class="team right">${m.t2}</span>
        </div>
      </div>
    </div>`;
}

// ============================================================
// Auto Refresh
// ============================================================
function startAutoRefresh() {
  fetchData();
  refreshTimer = setInterval(fetchData, REFRESH_INTERVAL);
}

// Pause when tab is hidden, resume when visible
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    clearInterval(refreshTimer);
  } else {
    fetchData();
    refreshTimer = setInterval(fetchData, REFRESH_INTERVAL);
  }
});

// ============================================================
// Init
// ============================================================
window.addEventListener('DOMContentLoaded', startAutoRefresh);
</script>
</body>
</html>
