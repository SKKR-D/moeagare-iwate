<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>トーナメント表｜盛岡市民スポーツ大会</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f8f0;--surface:#fff;--text:#1a1a1a;--text2:#666;--green:#1a4a2e;--green-light:#e6f0ea;--gold:#b8860b;--live:#dc2626;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{background:linear-gradient(135deg,#1a3a28,#2a6b42);color:#fff;padding:14px 20px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.15);}
.header h1{font-size:1rem;font-weight:700;} .header .sub{font-size:.75rem;opacity:.7;margin-top:2px;}
.header .live-bar{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px;font-size:.7rem;}
.live-dot{width:8px;height:8px;background:#ef4444;border-radius:50%;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.tabs{display:flex;justify-content:center;gap:4px;padding:12px 12px 0;flex-wrap:wrap;}
.tab-btn{padding:8px 18px;border:2px solid #ccc;border-bottom:none;border-radius:8px 8px 0 0;background:var(--surface);font-size:.85rem;font-weight:700;cursor:pointer;color:var(--text2);}
.tab-btn:hover{background:var(--green-light);} .tab-btn.active{background:var(--green);color:#fff;border-color:var(--green);}
.wrap{background:var(--surface);border:1px solid #ccc;margin:0 12px 12px;border-radius:0 0 12px 12px;padding:20px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.wrap-title{text-align:center;font-size:1.1rem;font-weight:900;color:var(--green);margin-bottom:8px;}
.wrap-hint{text-align:center;font-size:.7rem;color:var(--text2);margin-bottom:8px;display:none;}
@media(max-width:800px){.wrap-hint{display:block;}}
.info-bar{display:flex;justify-content:center;gap:12px;padding:8px 12px;font-size:.8rem;color:var(--text2);}
.info-chip{padding:4px 12px;border-radius:16px;font-weight:700;background:#fdf6e3;border:1px solid var(--gold);color:var(--gold);}
.footer{text-align:center;padding:16px;font-size:.7rem;color:var(--text2);}
</style>
</head>
<body>
<header class="header">
  <h1>第78回 盛岡市民スポーツ大会 ソフトテニス競技</h1>
  <div class="sub">令和8年4月25日（土）｜盛岡市立太田テニスコート</div>
  <div class="live-bar"><span class="live-dot"></span><span>LIVE — <span id="updateInfo">読み込み中...</span></span></div>
</header>
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('男子A')">男子A</button>
  <button class="tab-btn" onclick="switchTab('男子B')">男子B</button>
  <button class="tab-btn" onclick="switchTab('女子A')">女子A</button>
  <button class="tab-btn" onclick="switchTab('女子B')">女子B</button>
</div>
<div class="wrap">
  <div class="wrap-title" id="wrapTitle">男子Aトーナメント</div>
  <div class="wrap-hint">👈 横にスクロールできます 👉</div>
  <div id="bracketArea"></div>
</div>
<div class="info-bar" id="infoBar"></div>
<footer class="footer">岩手県中学生ソフトテニス連盟 大会DXシステム ｜ 30秒ごとに自動更新</footer>

<script>
var API = "https://script.google.com/macros/s/AKfycbyUQbnMbcFLFRObMbUQ1sKGrhq11GL99io2pGBTAT4X5IBsSpdQPPasOVKxt0HtdFk/exec";
var progressData = [];
var resultsData = {};
var currentTab = '男子A';

// ============================================================
// Drawing primitives
// ============================================================
function L(x1,y1,x2,y2,id){
  var c='#aaa',w=1;
  if(id){var p=gP(id);if(p.status==='試合中'){c='#dc2626';w=2.5;}}
  return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"/>';
}
function T(x,y,txt,anchor,size,color,weight){
  return '<text x="'+x+'" y="'+y+'" text-anchor="'+(anchor||'start')+'" font-size="'+(size||14)+'" font-weight="'+(weight||700)+'" fill="'+(color||'#1a1a1a')+'">'+esc(txt)+'</text>';
}
function LIVE(x,y,id){
  var p=gP(id);
  if(p.status==='試合中') return '<text x="'+x+'" y="'+y+'" text-anchor="middle" font-size="10" font-weight="900" fill="#dc2626">●LIVE</text>';
  return '';
}
function MN(x,y,id,anchor,circleNum){
  var n=circleNum||parseInt(id.substring(2))||0;
  var c=['','①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫','⑬','⑭','⑮','⑯','⑰'];
  return '<text x="'+x+'" y="'+y+'" text-anchor="'+(anchor||'middle')+'" font-size="14" font-weight="900" fill="#b8860b">'+(c[n]||n)+'</text>';
}
function gR(id){return resultsData[id]||null;}
function isWin(id){var p=gP(id);return p.status==='終了';}

// 手動描画ラウンド用：2本の水平線+縦線+スコア+勝者赤線を描画（左側用）
function drawRoundL(s,x1,y1,x2,y2,xConn,id){
  var mid=(y1+y2)/2;
  var p=gP(id), r=gR(id);
  if(p.status==='終了' && r){
    var wTop=(r.winsL>r.winsR);
    s+=drawLine(x1,y1,x2,y1,wTop?'#dc2626':'#aaa',wTop?2.5:1);
    s+=drawLine(x1,y2,x2,y2,wTop?'#aaa':'#dc2626',wTop?1:2.5);
    if(wTop){s+=drawLine(xConn,y1,xConn,mid,'#dc2626',2.5);s+=drawLine(xConn,mid,xConn,y2,'#aaa',1);}
    else{s+=drawLine(xConn,y1,xConn,mid,'#aaa',1);s+=drawLine(xConn,mid,xConn,y2,'#dc2626',2.5);}
    var cL='①②③④⑤⑥⑦⑧⑨'.split('');
    var sL=r.winsL>=2?(cL[r.winsL-1]||r.winsL):String(r.winsL);
    var sR=r.winsR>=2?(cL[r.winsR-1]||r.winsR):String(r.winsR);
    s+='<text x="'+(xConn+4)+'" y="'+(y1-2)+'" font-size="11" font-weight="900" fill="#dc2626">'+sL+'</text>';
    s+='<text x="'+(xConn+4)+'" y="'+(y2+14)+'" font-size="11" font-weight="900" fill="#dc2626">'+sR+'</text>';
  } else {
    s+=L(x1,y1,x2,y1,id);
    s+=L(x1,y2,x2,y2,id);
    s+=L(xConn,y1,xConn,y2,id);
  }
  s+=MN(xConn,mid+5,id);
  s+=LIVE((x1+x2)/2,mid-8,id);
  return s;
}

// 右側用
function drawRoundR(s,x1,y1,x2,y2,xConn,id){
  var mid=(y1+y2)/2;
  var p=gP(id), r=gR(id);
  if(p.status==='終了' && r){
    var wTop=(r.winsL>r.winsR);
    s+=drawLine(x1,y1,x2,y1,wTop?'#dc2626':'#aaa',wTop?2.5:1);
    s+=drawLine(x1,y2,x2,y2,wTop?'#aaa':'#dc2626',wTop?1:2.5);
    if(wTop){s+=drawLine(xConn,y1,xConn,mid,'#dc2626',2.5);s+=drawLine(xConn,mid,xConn,y2,'#aaa',1);}
    else{s+=drawLine(xConn,y1,xConn,mid,'#aaa',1);s+=drawLine(xConn,mid,xConn,y2,'#dc2626',2.5);}
    var cL='①②③④⑤⑥⑦⑧⑨'.split('');
    var sL=r.winsL>=2?(cL[r.winsL-1]||r.winsL):String(r.winsL);
    var sR=r.winsR>=2?(cL[r.winsR-1]||r.winsR):String(r.winsR);
    s+='<text x="'+(xConn-4)+'" y="'+(y1-2)+'" text-anchor="end" font-size="11" font-weight="900" fill="#dc2626">'+sL+'</text>';
    s+='<text x="'+(xConn-4)+'" y="'+(y2+14)+'" text-anchor="end" font-size="11" font-weight="900" fill="#dc2626">'+sR+'</text>';
  } else {
    s+=L(x1,y1,x2,y1,id);
    s+=L(x1,y2,x2,y2,id);
    s+=L(xConn,y1,xConn,y2,id);
  }
  s+=MN(xConn,mid+5,id);
  s+=LIVE((x1+x2)/2,mid-8,id);
  return s;
}
function gP(id){for(var i=0;i<progressData.length;i++){if(progressData[i].matchId===id)return progressData[i];}return{status:'待機中'};}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ============================================================
// Draw a standard 2-team match bracket segment
// Returns SVG string for: two horizontal lines + vertical connector + match number
// ============================================================
function drawMatch(x1,y1,x2,y2,xConn,id,cn){
  var mid=(y1+y2)/2;
  var s='';
  var p=gP(id), r=gR(id);
  if(p.status==='終了' && r){
    var wTop=(r.winsL>r.winsR);
    // 勝者の横線＝赤太、敗者の横線＝グレー細
    s+=drawLine(x1,y1,x2,y1,wTop?'#dc2626':'#aaa',wTop?2.5:1);
    s+=drawLine(x1,y2,x2,y2,wTop?'#aaa':'#dc2626',wTop?1:2.5);
    // 勝者の勝ち上がり縦線＝赤太、敗者側＝グレー
    if(wTop){
      s+=drawLine(xConn,y1,xConn,mid,'#dc2626',2.5);
      s+=drawLine(xConn,mid,xConn,y2,'#aaa',1);
    } else {
      s+=drawLine(xConn,y1,xConn,mid,'#aaa',1);
      s+=drawLine(xConn,mid,xConn,y2,'#dc2626',2.5);
    }
    // スコア表示（両方赤文字）
    var cL='①②③④⑤⑥⑦⑧⑨'.split('');
    var sL=r.winsL>=2?(cL[r.winsL-1]||r.winsL):String(r.winsL);
    var sR=r.winsR>=2?(cL[r.winsR-1]||r.winsR):String(r.winsR);
    s+='<text x="'+(xConn+4)+'" y="'+(y1-2)+'" font-size="11" font-weight="900" fill="#dc2626">'+sL+'</text>';
    s+='<text x="'+(xConn+4)+'" y="'+(y2+14)+'" font-size="11" font-weight="900" fill="#dc2626">'+sR+'</text>';
    // 勝者IDを記録（次ラウンドの線に使用）
    drawMatch._lastWin=id;
  } else {
    s+=L(x1,y1,x2,y1,id);
    s+=L(x1,y2,x2,y2,id);
    s+=L(xConn,y1,xConn,y2,id);
  }
  s+=MN(xConn,mid+5,id,undefined,cn);
  s+=LIVE((x1+x2)/2,mid-8,id);
  return s;
}

function drawMatchR(x1,y1,x2,y2,xConn,id,cn){
  var mid=(y1+y2)/2;
  var s='';
  var p=gP(id), r=gR(id);
  if(p.status==='終了' && r){
    var wTop=(r.winsL>r.winsR);
    s+=drawLine(x1,y1,x2,y1,wTop?'#dc2626':'#aaa',wTop?2.5:1);
    s+=drawLine(x1,y2,x2,y2,wTop?'#aaa':'#dc2626',wTop?1:2.5);
    if(wTop){
      s+=drawLine(xConn,y1,xConn,mid,'#dc2626',2.5);
      s+=drawLine(xConn,mid,xConn,y2,'#aaa',1);
    } else {
      s+=drawLine(xConn,y1,xConn,mid,'#aaa',1);
      s+=drawLine(xConn,mid,xConn,y2,'#dc2626',2.5);
    }
    var cL='①②③④⑤⑥⑦⑧⑨'.split('');
    var sL=r.winsL>=2?(cL[r.winsL-1]||r.winsL):String(r.winsL);
    var sR=r.winsR>=2?(cL[r.winsR-1]||r.winsR):String(r.winsR);
    s+='<text x="'+(xConn-4)+'" y="'+(y1-2)+'" text-anchor="end" font-size="11" font-weight="900" fill="#dc2626">'+sL+'</text>';
    s+='<text x="'+(xConn-4)+'" y="'+(y2+14)+'" text-anchor="end" font-size="11" font-weight="900" fill="#dc2626">'+sR+'</text>';
  } else {
    s+=L(x1,y1,x2,y1,id);
    s+=L(x1,y2,x2,y2,id);
    s+=L(xConn,y1,xConn,y2,id);
  }
  s+=MN(xConn,mid+5,id,undefined,cn);
  s+=LIVE((x1+x2)/2,mid-8,id);
  return s;
}

// 色指定付きのライン描画
function drawLine(x1,y1,x2,y2,color,width){
  return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(color||'#aaa')+'" stroke-width="'+(width||1)+'"/>';
}

// ============================================================
// 男子A: 16チーム、完全トーナメント
// ============================================================
function draw_MA(){
  var RH=46,NW=130,RW=100,MG=12;
  var W=NW+3*RW+60+3*RW+NW+MG*2, H=16*RH+MG*2;
  var s='<svg viewBox="0 0 '+W+' '+H+'" style="width:'+W+'px;min-width:'+W+'px;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg">';
  s+='<rect width="'+W+'" height="'+H+'" fill="white" rx="4"/>';

  var lTeams=["下小路中","大宮中","仙北中","飯岡中","厨川中","I.Kクラブ","北陵中","河南中"];
  var rTeams=["岩大附属中","土淵スポ少","黒石野中","上田中","みたけクラブ","見前中","乙部中","下橋中"];
  var lx=MG, rx=W-MG;
  var cx=W/2;

  // Y positions for 8 teams each side
  function yPos(i){return MG+RH*i*2+RH;}

  // Left team names + lines
  for(var i=0;i<8;i++){
    var y=yPos(i);
    s+=T(lx+4,y,(i+1)+' '+lTeams[i]);
    s+=L(lx,y+6,lx+NW,y+6);
  }
  // Right team names + lines
  for(var i=0;i<8;i++){
    var y=yPos(i);
    s+=T(rx-4,y,rTeams[i]+' '+(i+9),'end');
    s+=L(rx-NW,y+6,rx,y+6);
  }

  // Left R1: ①②③④
  var lr1x=lx+NW, lr1e=lr1x+RW;
  var lR1ids=["MA01","MA02","MA03","MA04"];
  var lR1mids=[];
  for(var i=0;i<4;i++){
    var y1=yPos(i*2)+6, y2=yPos(i*2+1)+6;
    s+=drawMatch(lr1x,y1,lr1e,y2,lr1e,lR1ids[i]);
    lR1mids.push((y1+y2)/2);
  }

  // Left R2: ⑨⑩
  var lr2x=lr1e, lr2e=lr2x+RW;
  var lR2ids=["MA09","MA10"];
  var lR2mids=[];
  for(var i=0;i<2;i++){
    var y1=lR1mids[i*2], y2=lR1mids[i*2+1];
    var w1=isWin(lR1ids[i*2]), w2=isWin(lR1ids[i*2+1]);
    s=drawRoundL(s,lr2x,y1,lr2e,y2,lr2e,lR2ids[i]);
    lR2mids.push((y1+y2)/2);
  }

  // Left Semi: ⑬ — 横線のみ（縦線なし）
  var lsx=lr2e, lse=lsx+RW;
  var lSemiMid=(lR2mids[0]+lR2mids[1])/2;
  var pSL=gP("MA13"), rSL=gR("MA13");
  if(pSL.status==='終了' && rSL){
    var wTop=(rSL.winsL>rSL.winsR);
    s+=drawLine(lsx,lR2mids[0],lse,lR2mids[0],wTop?'#dc2626':'#aaa',wTop?2.5:1);
    s+=drawLine(lsx,lR2mids[1],lse,lR2mids[1],wTop?'#aaa':'#dc2626',wTop?1:2.5);
    var cL='①②③④⑤⑥⑦⑧⑨'.split('');
    s+='<text x="'+(lse+4)+'" y="'+(lR2mids[0]-2)+'" font-size="11" font-weight="900" fill="#dc2626">'+(rSL.winsL>=2?(cL[rSL.winsL-1]||rSL.winsL):String(rSL.winsL))+'</text>';
    s+='<text x="'+(lse+4)+'" y="'+(lR2mids[1]+14)+'" font-size="11" font-weight="900" fill="#dc2626">'+(rSL.winsR>=2?(cL[rSL.winsR-1]||rSL.winsR):String(rSL.winsR))+'</text>';
  } else {
    s+=L(lsx,lR2mids[0],lse,lR2mids[0],"MA13");
    s+=L(lsx,lR2mids[1],lse,lR2mids[1],"MA13");
  }
  s+=MN(lse,lSemiMid+5,"MA13");
  s+=LIVE((lsx+lse)/2,lSemiMid-8,"MA13");

  // Right R1: ⑤⑥⑦⑧
  var rr1x=rx-NW, rr1e=rr1x-RW;
  var rR1ids=["MA05","MA06","MA07","MA08"];
  var rR1mids=[];
  for(var i=0;i<4;i++){
    var y1=yPos(i*2)+6, y2=yPos(i*2+1)+6;
    s+=drawMatchR(rr1x,y1,rr1e,y2,rr1e,rR1ids[i]);
    rR1mids.push((y1+y2)/2);
  }

  // Right R2: ⑪⑫
  var rr2x=rr1e, rr2e=rr2x-RW;
  var rR2ids=["MA11","MA12"];
  var rR2mids=[];
  for(var i=0;i<2;i++){
    var y1=rR1mids[i*2], y2=rR1mids[i*2+1];
    var w1=isWin(rR1ids[i*2]), w2=isWin(rR1ids[i*2+1]);
    s=drawRoundR(s,rr2x,y1,rr2e,y2,rr2e,rR2ids[i]);
    rR2mids.push((y1+y2)/2);
  }

  // Right Semi: ⑭ — 横線のみ（縦線なし）
  var rsx=rr2e, rse=rsx-RW;
  var rSemiMid=(rR2mids[0]+rR2mids[1])/2;
  var pSR=gP("MA14"), rSR=gR("MA14");
  if(pSR.status==='終了' && rSR){
    var wTop=(rSR.winsL>rSR.winsR);
    s+=drawLine(rsx,rR2mids[0],rse,rR2mids[0],wTop?'#dc2626':'#aaa',wTop?2.5:1);
    s+=drawLine(rsx,rR2mids[1],rse,rR2mids[1],wTop?'#aaa':'#dc2626',wTop?1:2.5);
    var cL='①②③④⑤⑥⑦⑧⑨'.split('');
    s+='<text x="'+(rse-4)+'" y="'+(rR2mids[0]-2)+'" text-anchor="end" font-size="11" font-weight="900" fill="#dc2626">'+(rSR.winsL>=2?(cL[rSR.winsL-1]||rSR.winsL):String(rSR.winsL))+'</text>';
    s+='<text x="'+(rse-4)+'" y="'+(rR2mids[1]+14)+'" text-anchor="end" font-size="11" font-weight="900" fill="#dc2626">'+(rSR.winsR>=2?(cL[rSR.winsR-1]||rSR.winsR):String(rSR.winsR))+'</text>';
  } else {
    s+=L(rsx,rR2mids[0],rse,rR2mids[0],"MA14");
    s+=L(rsx,rR2mids[1],rse,rR2mids[1],"MA14");
  }
  s+=MN(rse,rSemiMid+5,"MA14");
  s+=LIVE((rsx+rse)/2,rSemiMid-8,"MA14");

  // Final ⑮ — 左右から中央に縦線→中央から上に横線→優勝チーム名
  var finalY=Math.min(lSemiMid,rSemiMid)-60; // 決勝横線のY（準決勝より上）
  var fp=gP("MA15"), fr=gR("MA15");
  // 左準決勝から中央へ縦線
  s+=L(lse,lSemiMid,lse,finalY,"MA15");
  // 右準決勝から中央へ縦線
  s+=L(rse,rSemiMid,rse,finalY,"MA15");
  // 決勝横線（⑮の位置）
  if(fp.status==='終了' && fr){
    var wLeft=(fr.winsL>fr.winsR);
    s+=drawLine(lse,finalY,cx,finalY,wLeft?'#dc2626':'#aaa',wLeft?2.5:1);
    s+=drawLine(rse,finalY,cx,finalY,wLeft?'#aaa':'#dc2626',wLeft?1:2.5);
    // 優勝チーム名を横線の上に表示
    s+=drawLine(cx,finalY,cx,finalY-30,'#dc2626',2.5);
    s+='<text x="'+cx+'" y="'+(finalY-36)+'" text-anchor="middle" font-size="16" font-weight="900" fill="#dc2626">🏆 '+esc(fr.winner)+'</text>';
    // スコア表示
    var cL='①②③④⑤⑥⑦⑧⑨'.split('');
    var sL=fr.winsL>=2?(cL[fr.winsL-1]||fr.winsL):String(fr.winsL);
    var sR=fr.winsR>=2?(cL[fr.winsR-1]||fr.winsR):String(fr.winsR);
    s+='<text x="'+(cx-6)+'" y="'+(finalY-4)+'" text-anchor="end" font-size="11" font-weight="900" fill="#dc2626">'+sL+'</text>';

  s+=L(rx3,m14,rx4,m14,"FA16");
  s+=L(rx4,m13,rx4,m14,"FA16");
  var m16=(m13+m14)/2; s+=MN(rx4,m16+5,"FA16"); s+=LIVE((rx3+rx4)/2,m16-8,"FA16");

  // ========= 決勝 ⑰ FA17 =========
  // ⑮⑯⑰は同じ高さで水平直線で結ぶ
  var finalY=(m15+m16)/2;
  s+=L(x4,m15,x4,finalY,"FA15");
  s+=L(rx4,m16,rx4,finalY,"FA16");
  s+=L(x4,finalY,cx,finalY,"FA17");
  s+=L(rx4,finalY,cx,finalY,"FA17");
  s+=MN(cx,finalY-2,"FA17");
  var fp=gP("FA17");
  if(fp.status==='終了') s+=T(cx,finalY+16,'栄冠','middle',14,'#1a4a2e',900);
  else if(fp.status==='試合中') s+='<text x="'+cx+'" y="'+(finalY+16)+'" text-anchor="middle" font-size="10" font-weight="900" fill="#dc2626">●LIVE</text>';

  s+='</svg>';
  return s;
}

// ============================================================
// 女子B// ============================================================
// 女子B: 12チーム (左6,右6) - 画像から正確に
// Left: 1飯岡,2乙部→①、3黒石野,4土淵→②、①勝v5見前→⑤、②勝v6下小路→⑥、⑤勝v⑥勝→⑨
// Right: 7厨川,8仙北→③、9大宮,10河南→④、③勝v11上田→⑦、④勝v12北陵→⑧、⑦勝v⑧勝→⑩
// Final: ⑨v⑩→⑪
// ============================================================
function draw_FB(){
  var RH=54,NW=130,RW=100,MG=12;
  var W=NW+3*RW+60+3*RW+NW+MG*2, H=6*RH*2+MG*2;
  var s='<svg viewBox="0 0 '+W+' '+H+'" style="width:'+W+'px;min-width:'+W+'px;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg">';
  s+='<rect width="'+W+'" height="'+H+'" fill="white" rx="4"/>';

  var lx=MG, rx=W-MG, cx=W/2;
  function yP(i){return MG+RH*i*2+RH;}
  var yL=function(i){return yP(i)+6;};

  var lTeams=["飯岡中","乙部中","黒石野中","土淵中","見前中","下小路中"];
  var rTeams=["厨川中","仙北中","大宮中","河南中","上田中","北陵中"];

  for(var i=0;i<6;i++){var y=yP(i);s+=T(lx+4,y,(i+1)+' '+lTeams[i]);s+=L(lx,y+6,lx+NW,y+6);}
  for(var i=0;i<6;i++){var y=yP(i);s+=T(rx-4,y,rTeams[i]+' '+(i+7),'end');s+=L(rx-NW,y+6,rx,y+6);}

  var x0=lx+NW, x1=x0+RW, x2=x1+RW, x3=x2+RW;
  var rx0=rx-NW, rx1=rx0-RW, rx2=rx1-RW, rx3=rx2-RW;

  // LEFT
  // ① FB01: 2乙部 vs 3黒石野 (index 1,2)
  s+=drawMatch(x0,yL(1),x1,yL(2),x1,"FB01"); var m01=(yL(1)+yL(2))/2;
  // ② FB02: 4土淵 vs 5見前 (index 3,4)
  s+=drawMatch(x0,yL(3),x1,yL(4),x1,"FB02"); var m02=(yL(3)+yL(4))/2;
  // ⑤ FB05: 1飯岡(seed・上) vs ①勝者(下)
  s+=L(x0,yL(0),x2,yL(0),"FB05"); // 1飯岡のシード線を延長
  s+=L(x1,m01,x2,m01,"FB05");     // ①勝者の線を延長
  s+=L(x2,yL(0),x2,m01,"FB05");   // 縦接続
  var m05=(yL(0)+m01)/2; s+=MN(x2,m05+5,"FB05"); s+=LIVE((x1+x2)/2,m05-8,"FB05");
  // ⑥ FB06: ②勝者(上) vs 6下小路(seed・下)
  s+=L(x1,m02,x2,m02,"FB06");     // ②勝者の線を延長
  s+=L(x0,yL(5),x2,yL(5),"FB06"); // 6下小路のシード線を延長
  s+=L(x2,m02,x2,yL(5),"FB06");   // 縦接続
  var m06=(m02+yL(5))/2; s+=MN(x2,m06+5,"FB06"); s+=LIVE((x1+x2)/2,m06-8,"FB06");
  // ⑨ FB09: ⑤勝 vs ⑥勝
  s+=L(x2,m05,x3,m05,"FB09"); s+=L(x2,m06,x3,m06,"FB09"); s+=L(x3,m05,x3,m06,"FB09");
  var m09=(m05+m06)/2; s+=MN(x3,m09+5,"FB09"); s+=LIVE((x2+x3)/2,m09-8,"FB09");

  // RIGHT
  // ③ FB03: 8仙北 vs 9大宮 (index 1,2)
  s+=drawMatchR(rx0,yL(1),rx1,yL(2),rx1,"FB03"); var mr03=(yL(1)+yL(2))/2;
  // ④ FB04: 10河南 vs 11上田 (index 3,4)
  s+=drawMatchR(rx0,yL(3),rx1,yL(4),rx1,"FB04"); var mr04=(yL(3)+yL(4))/2;
  // ⑦ FB07: 7厨川(seed・上) vs ③勝者(下)
  s+=L(rx0,yL(0),rx2,yL(0),"FB07"); // 7厨川のシード線を延長
  s+=L(rx1,mr03,rx2,mr03,"FB07");    // ③勝者の線を延長
  s+=L(rx2,yL(0),rx2,mr03,"FB07");   // 縦接続
  var mr07=(yL(0)+mr03)/2; s+=MN(rx2,mr07+5,"FB07"); s+=LIVE((rx1+rx2)/2,mr07-8,"FB07");
  // ⑧ FB08: ④勝者(上) vs 12北陵(seed・下)
  s+=L(rx1,mr04,rx2,mr04,"FB08");     // ④勝者の線を延長
  s+=L(rx0,yL(5),rx2,yL(5),"FB08");   // 12北陵のシード線を延長
  s+=L(rx2,mr04,rx2,yL(5),"FB08");    // 縦接続
  var mr08=(mr04+yL(5))/2; s+=MN(rx2,mr08+5,"FB08"); s+=LIVE((rx1+rx2)/2,mr08-8,"FB08");
  // ⑩ FB10: ⑦勝 vs ⑧勝
  s+=L(rx2,mr07,rx3,mr07,"FB10"); s+=L(rx2,mr08,rx3,mr08,"FB10"); s+=L(rx3,mr07,rx3,mr08,"FB10");
  var mr10=(mr07+mr08)/2; s+=MN(rx3,mr10+5,"FB10"); s+=LIVE((rx2+rx3)/2,mr10-8,"FB10");

  // FINAL ⑪
  s+=L(x3,m09,cx,m09,"FB11"); s+=L(rx3,mr10,cx,mr10,"FB11");
  if(Math.abs(m09-mr10)>1) s+=L(cx,m09,cx,mr10,"FB11");
  var mF=(m09+mr10)/2;
  s+=MN(cx,mF-2,"FB11");
  var fp=gP("FB11");
  if(fp.status==='終了') s+=T(cx,mF+16,'栄冠','middle',14,'#1a4a2e',900);
  else if(fp.status==='試合中') s+='<text x="'+cx+'" y="'+(mF+16)+'" text-anchor="middle" font-size="10" font-weight="900" fill="#dc2626">●LIVE</text>';

  s+='</svg>';
  return s;
}

// ============================================================
// Main render
// ============================================================
function render(){
  var area=document.getElementById('bracketArea');
  if(currentTab==='男子A') area.innerHTML=draw_MA();
  else if(currentTab==='男子B') area.innerHTML=draw_MB();
  else if(currentTab==='女子A') area.innerHTML=draw_FA_clean();
  else if(currentTab==='女子B') area.innerHTML=draw_FB();
  renderInfo();
}

function switchTab(t){
  currentTab=t;
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.toggle('active',b.textContent===t);});
  var titles={'男子A':'男子Aトーナメント','男子B':'男子Bトーナメント','女子A':'女子Aトーナメント','女子B':'女子Bトーナメント'};
  document.getElementById('wrapTitle').textContent=titles[t]||t;
  render();
}

function renderInfo(){
  var allIds={
    '男子A':["MA01","MA02","MA03","MA04","MA05","MA06","MA07","MA08","MA09","MA10","MA11","MA12","MA13","MA14","MA15"],
    '男子B':["MB01","MB02","MB03","MB04","MB05"],
    '女子A':["FA01","FA02","FA03","FA04","FA05","FA06","FA07","FA08","FA09","FA10","FA11","FA12","FA13","FA14","FA15","FA16","FA17"],
    '女子B':["FB01","FB02","FB03","FB04","FB05","FB06","FB07","FB08","FB09","FB10","FB11"]
  };
  var ids=allIds[currentTab]||[];
  var done=0;
  for(var i=0;i<ids.length;i++){if(gP(ids[i]).status==='終了')done++;}
  document.getElementById('infoBar').innerHTML='<span class="info-chip">進行: '+done+' / '+ids.length+'試合完了</span>';
}

function fetchData(){
  Promise.all([
    fetch(API+"?action=getProgress").then(function(r){return r.json();}),
    fetch(API+"?action=getResults").then(function(r){return r.json();})
  ]).then(function(arr){
    progressData=arr[0]||[];
    resultsData=arr[1]||{};
    var now=new Date();
    document.getElementById('updateInfo').textContent=now.getHours()+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0')+' 更新';
    render();
  }).catch(function(){document.getElementById('updateInfo').textContent='⚠ 通信エラー';});
}

var refreshTimer=null;
document.addEventListener('visibilitychange',function(){
  if(document.hidden)clearInterval(refreshTimer);
  else{fetchData();refreshTimer=setInterval(fetchData,30000);}
});
window.addEventListener('DOMContentLoaded',function(){fetchData();refreshTimer=setInterval(fetchData,30000);});
</script>
