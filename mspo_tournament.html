<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>トーナメント表｜盛岡市民スポーツ大会</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f8f0;--surface:#fff;--text:#1a1a1a;--text2:#666;--green:#1a4a2e;--green-light:#e6f0ea;--gold:#b8860b;--live:#dc2626;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{background:linear-gradient(135deg,#1a3a28,#2a6b42);color:#fff;padding:14px 20px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.15);}
.header h1{font-size:1rem;font-weight:700;} .header .sub{font-size:.75rem;opacity:.7;margin-top:2px;}
.header .live-bar{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px;font-size:.7rem;}
.live-dot{width:8px;height:8px;background:#ef4444;border-radius:50%;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.tabs{display:flex;justify-content:center;gap:4px;padding:12px 12px 0;flex-wrap:wrap;}
.tab-btn{padding:8px 18px;border:2px solid #ccc;border-bottom:none;border-radius:8px 8px 0 0;background:var(--surface);font-size:.85rem;font-weight:700;cursor:pointer;color:var(--text2);}
.tab-btn:hover{background:var(--green-light);} .tab-btn.active{background:var(--green);color:#fff;border-color:var(--green);}
.wrap{background:var(--surface);border:1px solid #ccc;margin:0 12px 12px;border-radius:0 0 12px 12px;padding:20px;overflow-x:auto;}
.wrap-title{text-align:center;font-size:1.1rem;font-weight:900;color:var(--green);margin-bottom:16px;}
.info-bar{display:flex;justify-content:center;gap:12px;padding:8px 12px;font-size:.8rem;color:var(--text2);}
.info-chip{padding:4px 12px;border-radius:16px;font-weight:700;background:#fdf6e3;border:1px solid var(--gold);color:var(--gold);}
.footer{text-align:center;padding:16px;font-size:.7rem;color:var(--text2);}
</style>
</head>
<body>
<header class="header">
  <h1>第78回 盛岡市民スポーツ大会 ソフトテニス競技</h1>
  <div class="sub">令和8年4月25日（土）｜盛岡市立太田テニスコート</div>
  <div class="live-bar"><span class="live-dot"></span><span>LIVE — <span id="updateInfo">読み込み中...</span></span></div>
</header>
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('男子A')">男子A</button>
  <button class="tab-btn" onclick="switchTab('男子B')">男子B</button>
  <button class="tab-btn" onclick="switchTab('女子A')">女子A</button>
  <button class="tab-btn" onclick="switchTab('女子B')">女子B</button>
</div>
<div class="wrap">
  <div class="wrap-title" id="wrapTitle">男子Aトーナメント</div>
  <div id="bracketArea"></div>
</div>
<div class="info-bar" id="infoBar"></div>
<footer class="footer">岩手県中学生ソフトテニス連盟 大会DXシステム ｜ 30秒ごとに自動更新</footer>

<script>
var API = "https://script.google.com/macros/s/AKfycbyUQbnMbcFLFRObMbUQ1sKGrhq11GL99io2pGBTAT4X5IBsSpdQPPasOVKxt0HtdFk/exec";
var progressData = [];
var currentTab = '男子A';

// ============================================================
// Bracket data: left teams, right teams, match tree
// tree node: { id, left:node|null, right:node|null, leftSeed, rightSeed }
// ============================================================
var BRACKETS = {
  "男子A": {
    title: "男子Aトーナメント",
    left: ["下小路中","大宮中","仙北中","飯岡中","厨川中","I.Kクラブ","北陵中","河南中"],
    right: ["岩大附属中","土淵スポ少","黒石野中","上田中","みたけクラブ","見前中","乙部中","下橋中"],
    leftNums: [1,2,3,4,5,6,7,8],
    rightNums: [9,10,11,12,13,14,15,16],
    // Match tree from leaves to root (left side)
    // R1: 4 matches, R2: 2, Semi: 1
    leftMatches: [
      ["MA01","MA02","MA03","MA04"],  // R1
      ["MA09","MA10"],                 // R2
      ["MA13"]                         // Semi
    ],
    rightMatches: [
      ["MA05","MA06","MA07","MA08"],
      ["MA11","MA12"],
      ["MA14"]
    ],
    finalId: "MA15"
  },
  "男子B": {
    title: "男子Bトーナメント",
    left: ["下小路中","大宮中","見前中"],
    right: ["河南中","下橋中","上田中"],
    leftNums: [1,2,3],
    rightNums: [4,5,6],
    leftMatches: [
      ["MB01",null],   // R1: 1vs2, 3=bye
      ["MB03"]          // Semi: MB01勝者 vs 3
    ],
    rightMatches: [
      ["MB02",null],
      ["MB04"]
    ],
    finalId: "MB05"
  },
  "女子A": {
    title: "女子Aトーナメント",
    left: ["仙北中","上田中","見前中","大宮中","松園中","岩大附属中","城東中","飯岡中","土淵中"],
    right: ["乙部中","河南中","見前南中","下橋中","下小路中","城西中","厨川中","北陵中","黒石野中"],
    leftNums: [1,2,3,4,5,6,7,8,9],
    rightNums: [10,11,12,13,14,15,16,17,18],
    // 9 teams: 1 bye + 1 R1 match, then 4 R2, 2 QF, 1 Semi
    leftMatches: [
      ["FA01",null,null,"FA02"],  // 位置: 2v3, bye, bye, 8v9
      ["FA09","FA03","FA04","FA05"], // 1vsFA01勝,4v5,6v7,FA02勝vs?
      ["FA11","FA12"],
      ["FA15"]
    ],
    rightMatches: [
      [null,"FA06",null,"FA10"],
      [null,"FA07","FA08",null],
      ["FA13","FA14"],
      ["FA16"]
    ],
    finalId: "FA17"
  },
  "女子B": {
    title: "女子Bトーナメント",
    left: ["飯岡中","乙部中","黒石野中","土淵中","見前中","下小路中"],
    right: ["厨川中","仙北中","大宮中","河南中","上田中","北陵中"],
    leftNums: [1,2,3,4,5,6],
    rightNums: [7,8,9,10,11,12],
    leftMatches: [
      ["FB01","FB02",null],  // 1v2, 3v4, bye5, bye6
      ["FB05","FB06"],
      ["FB09"]
    ],
    rightMatches: [
      ["FB03","FB04",null],
      ["FB07","FB08"],
      ["FB10"]
    ],
    finalId: "FB11"
  }
};

// ============================================================
// SVG drawing
// ============================================================
function render() {
  var b = BRACKETS[currentTab];
  if (!b) return;

  var leftN = b.left.length;
  var rightN = b.right.length;
  var maxN = Math.max(leftN, rightN);

  var RH = 32;    // row height per team
  var NW = 105;   // name column width
  var RW = 80;    // round column width
  var CG = 50;    // center gap for final
  var MG = 8;

  var leftR = b.leftMatches.length;
  var rightR = b.rightMatches.length;
  var maxR = Math.max(leftR, rightR);

  var H = maxN * RH * 2 + MG * 2 + 20;
  var halfW = NW + (maxR + 0.5) * RW;
  var W = halfW * 2 + CG;

  var s = '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="max-width:'+Math.min(W,950)+'px;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg">';
  s += '<rect width="'+W+'" height="'+H+'" fill="white" rx="4"/>';

  // Compute Y positions for teams
  function teamYs(n) {
    var ys = [];
    var totalH = maxN * RH * 2;
    var gap = totalH / n;
    for (var i = 0; i < n; i++) {
      ys.push(MG + 16 + gap * i + gap / 2);
    }
    return ys;
  }

  var lys = teamYs(leftN);
  var rys = teamYs(rightN);

  // Draw left team names
  for (var i = 0; i < leftN; i++) {
    s += '<text x="'+(MG+4)+'" y="'+lys[i]+'" font-size="11" font-weight="700" fill="#1a1a1a">'+b.leftNums[i]+' '+esc(b.left[i])+'</text>';
    s += ln(MG, lys[i]+5, MG+NW, lys[i]+5, '#aaa', 1);
  }

  // Draw right team names
  for (var i = 0; i < rightN; i++) {
    var rx = W - MG;
    s += '<text x="'+(rx-4)+'" y="'+rys[i]+'" font-size="11" font-weight="700" fill="#1a1a1a" text-anchor="end">'+esc(b.right[i])+' '+b.rightNums[i]+'</text>';
    s += ln(rx-NW, rys[i]+5, rx, rys[i]+5, '#aaa', 1);
  }

  // Draw bracket rounds - left side
  var lFinalY = drawRounds(s, lys, b.leftMatches, MG+NW, RW, 'L');
  s = lFinalY.svg;
  var lLastY = lFinalY.lastY;
  var lLastX = MG + NW + leftR * RW;

  // Draw bracket rounds - right side
  var rFinalY = drawRounds(s, rys, b.rightMatches, W-MG-NW, RW, 'R');
  s = rFinalY.svg;
  var rLastY = rFinalY.lastY;
  var rLastX = W - MG - NW - rightR * RW;

  // Final
  var centerX = W / 2;
  var fProg = getProg(b.finalId);
  var fCol = stCol(fProg.status);
  var fSw = fProg.status === '待機中' ? 1 : 2;

  s += ln(lLastX, lLastY, centerX, lLastY, fCol, fSw);
  s += ln(rLastX, rLastY, centerX, rLastY, fCol, fSw);
  if (Math.abs(lLastY - rLastY) > 1) {
    s += ln(centerX, lLastY, centerX, rLastY, fCol, fSw);
  }

  var fMidY = (lLastY + rLastY) / 2;
  s += '<text x="'+centerX+'" y="'+(fMidY)+'" text-anchor="middle" font-size="12" font-weight="900" fill="#b8860b">'+circled(b.finalId)+'</text>';

  if (fProg.status === '終了') {
    s += '<text x="'+centerX+'" y="'+(fMidY+16)+'" text-anchor="middle" font-size="12" font-weight="900" fill="#1a4a2e">栄冠</text>';
  } else if (fProg.status === '試合中') {
    s += '<text x="'+centerX+'" y="'+(fMidY+16)+'" text-anchor="middle" font-size="10" font-weight="900" fill="#dc2626">●LIVE</text>';
  }

  s += '</svg>';
  document.getElementById('bracketArea').innerHTML = s;
  renderInfo();
}

function drawRounds(svg, teamYs, matchRounds, startX, rw, side) {
  var s = svg;
  var curYs = [];
  for (var i = 0; i < teamYs.length; i++) curYs.push(teamYs[i] + 5);

  var isL = (side === 'L');

  for (var r = 0; r < matchRounds.length; r++) {
    var matches = matchRounds[r];
    var nextYs = [];
    var x1 = isL ? startX + r * rw : startX - r * rw;
    var x2 = isL ? x1 + rw : x1 - rw;
    var mi = 0;

    var i = 0;
    while (i < curYs.length) {
      var matchId = matches[mi] || null;
      mi++;

      if (i + 1 >= curYs.length) {
        // Odd team - bye, carry forward
        nextYs.push(curYs[i]);
        s += ln(x1, curYs[i], x2, curYs[i], '#aaa', 1);
        i++;
        continue;
      }

      if (matchId === null) {
        // This pair is a bye - both carry through
        // Actually this means no match, just a line through
        nextYs.push(curYs[i]);
        s += ln(x1, curYs[i], x2, curYs[i], '#aaa', 1);
        nextYs.push(curYs[i+1]);
        s += ln(x1, curYs[i+1], x2, curYs[i+1], '#aaa', 1);
        i += 2;
        continue;
      }

      var y1 = curYs[i];
      var y2 = curYs[i+1];
      var mid = (y1 + y2) / 2;
      nextYs.push(mid);

      var prog = getProg(matchId);
      var col = stCol(prog.status);
      var sw = prog.status === '待機中' ? 1 : 2;

      // Two horizontal lines
      s += ln(x1, y1, x2, y1, col, sw);
      s += ln(x1, y2, x2, y2, col, sw);
      // Vertical connector
      s += ln(x2, y1, x2, y2, col, sw);

      // Match number
      var mnX = isL ? x2 - 4 : x2 + 4;
      var mnAnc = isL ? 'end' : 'start';
      s += '<text x="'+mnX+'" y="'+(mid+4)+'" text-anchor="'+mnAnc+'" font-size="11" font-weight="900" fill="#b8860b">'+circled(matchId)+'</text>';

      if (prog.status === '試合中') {
        var lvX = (x1 + x2) / 2;
        s += '<text x="'+lvX+'" y="'+(mid-6)+'" text-anchor="middle" font-size="8" font-weight="900" fill="#dc2626">●LIVE</text>';
      }

      i += 2;
    }

    curYs = nextYs;
  }

  var lastY = curYs.length > 0 ? curYs[0] : 0;
  return { svg: s, lastY: lastY };
}

// ============================================================
// Helpers
// ============================================================
var CIRCLES = ['','①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫','⑬','⑭','⑮','⑯','⑰'];
function circled(id) { var n = parseInt(id.substring(2))||0; return CIRCLES[n]||String(n); }
function getProg(id) { for(var i=0;i<progressData.length;i++){if(progressData[i].matchId===id)return progressData[i];} return {matchId:id,status:'待機中'}; }
function stCol(st) { return st==='試合中'?'#dc2626':st==='終了'?'#1a4a2e':'#aaa'; }
function ln(x1,y1,x2,y2,c,w) { return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"/>'; }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function switchTab(t) {
  currentTab = t;
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.toggle('active',b.textContent===t);});
  document.getElementById('wrapTitle').textContent = BRACKETS[t]?.title || t;
  render();
}

function renderInfo() {
  var b = BRACKETS[currentTab]; if(!b) return;
  var all = [], done = 0;
  function collect(arr){if(!arr)return;for(var r=0;r<arr.length;r++){for(var m=0;m<arr[r].length;m++){if(arr[r][m]){all.push(arr[r][m]);if(getProg(arr[r][m]).status==='終了')done++;}}}}
  collect(b.leftMatches); collect(b.rightMatches);
  if(b.finalId){all.push(b.finalId);if(getProg(b.finalId).status==='終了')done++;}
  document.getElementById('infoBar').innerHTML = '<span class="info-chip">進行: '+done+' / '+all.length+'試合完了</span>';
}

function fetchData() {
  fetch(API+"?action=getProgress").then(function(r){return r.json();}).then(function(d){
    progressData = d||[];
    var now = new Date();
    document.getElementById('updateInfo').textContent = now.getHours()+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0')+' 更新';
    render();
  }).catch(function(){document.getElementById('updateInfo').textContent='⚠ 通信エラー';});
}

var refreshTimer = null;
document.addEventListener('visibilitychange',function(){
  if(document.hidden)clearInterval(refreshTimer);
  else{fetchData();refreshTimer=setInterval(fetchData,30000);}
});
window.addEventListener('DOMContentLoaded',function(){fetchData();refreshTimer=setInterval(fetchData,30000);});
</script>
</body>
</html>
